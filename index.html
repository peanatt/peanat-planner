<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐭 PLANNER - PEANAT.NN</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0D1B3E;--teal:#4DC9C2;--teal2:#2BA8A0;--red:#D63031;
  --text:#FFFFFF;--text2:#C8D8F0;--text3:#8AA8CC;
  --card-r:20px;--font:'Baloo 2',sans-serif;
}
body{font-family:var(--font);background:linear-gradient(160deg,#050E24 0%,#0D1B3E 40%,#0A2244 70%,#0D1030 100%);min-height:100vh;color:var(--text);position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background-image:radial-gradient(circle,#FFFFFF99 1px,transparent 1px),radial-gradient(circle,#4DC9C260 1px,transparent 1px),radial-gradient(circle,#FFE87A50 1px,transparent 1px);
  background-size:80px 80px,120px 120px,100px 100px;background-position:0 0,40px 40px,20px 60px;opacity:0.5;z-index:0;}

.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:16px;}

/* ===== HEADER ===== */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;
  background:rgba(13,27,62,0.95);backdrop-filter:blur(12px);border-radius:var(--card-r);
  border:2px solid rgba(77,201,194,0.4);margin-bottom:16px;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;}
/* Mickey logo in header - small inline SVG */
.logo-mickey-wrap{position:relative;width:44px;height:44px;flex-shrink:0;}
.logo-mickey-wrap svg{filter:drop-shadow(0 0 6px rgba(77,201,194,0.6));}
.logo-wrap{display:flex;flex-direction:column;line-height:1.1;}
.logo-text{font-size:19px;font-weight:800;color:#4DC9C2;letter-spacing:.5px;animation:pulse-logo 3s ease-in-out infinite;}
.logo-sub{font-size:11px;font-weight:600;color:#8AA8CC;letter-spacing:1px;margin-top:-2px;}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{font-family:var(--font);font-size:13px;font-weight:700;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-gcal{background:linear-gradient(135deg,#1E3A6E,#2A4A8E);color:#4DC9C2;border:2px solid rgba(77,201,194,0.5);}
.btn-gcal:hover{opacity:.85;transform:translateY(-1px);}
.btn-add{background:linear-gradient(135deg,#D63031,#A01010);color:#FFF;border:2px solid rgba(255,80,80,0.5);}
.btn-add:hover{opacity:.85;transform:translateY(-1px);}
.btn-notify{background:linear-gradient(135deg,#1A4030,#1A3850);color:#80FFD0;border:2px solid rgba(128,255,208,0.3);position:relative;}
.notif-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#FF4444;border-radius:50%;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.gs-status{background:rgba(20,60,30,0.7);border:1.5px solid rgba(77,201,194,0.4);border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;color:#80FFD0;display:flex;align-items:center;gap:6px;}
.gs-dot{width:7px;height:7px;border-radius:50%;background:#4DC9C2;animation:twinkle 1.5s ease-in-out infinite;}

/* ===== NOTIF ===== */
.notif-panel{background:rgba(10,22,50,0.97);border:2px solid rgba(77,201,194,0.35);border-radius:var(--card-r);padding:16px;margin-bottom:12px;display:none;}
.notif-panel.open{display:block;}
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:8px;border-radius:10px;margin-bottom:6px;cursor:pointer;}
.notif-item.urgent{background:rgba(255,80,80,0.12);}
.notif-item.soon{background:rgba(255,200,80,0.1);}
.notif-item.info{background:rgba(77,201,194,0.1);}
.notif-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.dot-urgent{background:#FF8080;}.dot-soon{background:#FFB840;}.dot-info{background:#4DC9C2;}
.notif-text{font-size:14px;color:var(--text);line-height:1.4;}
.notif-time{font-size:12px;color:var(--text3);}

/* ===== LAYOUT: sidebar fixed width + calendar fills rest ===== */
.main-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start;}
@media(max-width:900px){.main-layout{grid-template-columns:1fr;}}

/* ===== SIDEBAR ===== */
.sidebar{display:flex;flex-direction:column;gap:12px;}

/* Summary card */
.summary-card{background:rgba(13,27,62,0.92);backdrop-filter:blur(8px);border-radius:var(--card-r);padding:16px;border:2px solid rgba(77,201,194,0.3);}
.summary-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.stab{font-family:var(--font);font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;background:none;color:#8AA8CC;transition:.15s;}
.stab.active{background:rgba(77,201,194,0.2);color:#4DC9C2;border-color:rgba(77,201,194,0.5);}
.summary-stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(77,201,194,0.2);font-size:13px;color:#C8D8F0;font-weight:600;}
.summary-stat:last-child{border:none;}
.stat-num{font-weight:800;font-size:16px;color:#4DC9C2;}
.summary-list{margin-top:8px;}
.sum-event{display:flex;gap:8px;align-items:flex-start;padding:6px 8px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:.15s;}
.sum-event:hover{background:rgba(77,201,194,0.12);}
.sum-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.sum-info{font-size:13px;color:#FFF;line-height:1.4;font-weight:600;}
.sum-time{font-size:11px;color:#8AA8CC;}
.sum-done{text-decoration:line-through;opacity:.5;}

/* ===== HABIT TRACKER ===== */
.habit-card{background:rgba(13,27,62,0.92);backdrop-filter:blur(8px);border-radius:var(--card-r);padding:16px;border:2px solid rgba(77,201,194,0.3);}
.habit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.habit-title{font-size:15px;font-weight:800;color:#4DC9C2;}
.habit-add-btn{background:rgba(77,201,194,0.15);border:1.5px solid rgba(77,201,194,0.4);border-radius:8px;padding:5px 12px;color:#4DC9C2;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.habit-add-btn:hover{background:rgba(77,201,194,0.3);}
.habit-month-label{font-size:11px;font-weight:700;color:#8AA8CC;margin-bottom:6px;text-align:center;}
.habit-week-row{display:grid;grid-template-columns:100px repeat(7,minmax(0,1fr));gap:3px;margin-bottom:4px;}
.habit-week-label{font-size:10px;font-weight:800;color:#4DC9C2;text-align:center;padding:2px 0;min-width:0;overflow:hidden;}
.habit-row{display:grid;grid-template-columns:100px repeat(7,minmax(0,1fr));gap:3px;align-items:center;margin-bottom:6px;}
.habit-dot{width:100%;aspect-ratio:1;border-radius:6px;border:1.5px solid rgba(77,201,194,0.2);background:rgba(13,27,62,0.5);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0;position:relative;}
/* name cell */
.habit-name-cell{display:flex;align-items:center;gap:5px;padding-right:4px;position:relative;}
.habit-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;background:rgba(77,201,194,0.12);border:1px solid rgba(77,201,194,0.2);}
.habit-name{font-size:11px;font-weight:700;color:#C8D8F0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:pointer;}
.habit-name:hover{color:#4DC9C2;}
/* action buttons shown on hover */
.habit-name-cell:hover .habit-actions{opacity:1;}
.habit-actions{opacity:0;transition:.15s;display:flex;gap:2px;position:absolute;right:-2px;top:50%;transform:translateY(-50%);background:rgba(13,27,62,0.95);border-radius:6px;padding:2px 3px;border:1px solid rgba(77,201,194,0.2);}
.habit-act-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;border-radius:4px;line-height:1;font-family:var(--font);}
.habit-edit-btn{color:#4DC9C2;}.habit-edit-btn:hover{background:rgba(77,201,194,0.2);}
.habit-del-btn{color:#FF8080;}.habit-del-btn:hover{background:rgba(255,80,80,0.15);}
.habit-dot:hover{border-color:rgba(77,201,194,0.5);background:rgba(77,201,194,0.08);}
.habit-dot.done{background:linear-gradient(135deg,#4DC9C2,#2BA8A0);border-color:#4DC9C2;box-shadow:0 0 6px rgba(77,201,194,0.4);}
.habit-dot.done::after{content:'';display:block;width:6px;height:10px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);margin-top:-2px;}
.habit-dot.today-col{border-color:rgba(214,48,49,0.55);}
.habit-dot.done.today-col{background:linear-gradient(135deg,#D63031,#A01010);box-shadow:0 0 6px rgba(214,48,49,0.4);}
/* streak bar */
.habit-streak-row{grid-column:2/-1;display:flex;align-items:center;gap:4px;padding-bottom:2px;}
.habit-streak-bar{height:2px;border-radius:2px;background:linear-gradient(90deg,#FFE87A,#FFA040);flex:1;}
.habit-streak-txt{font-size:9px;color:#FFE87A;font-weight:800;white-space:nowrap;}
.habit-empty{text-align:center;font-size:12px;color:#8AA8CC;padding:20px 0;}
/* modal for add/edit habit */
.habit-modal-overlay{position:fixed;inset:0;background:rgba(5,14,36,0.8);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;}
.habit-modal{background:rgba(13,27,62,0.99);border:2px solid rgba(77,201,194,0.4);border-radius:20px;padding:24px;width:min(340px,90vw);box-shadow:0 20px 60px rgba(0,10,40,0.7);}
.habit-modal-title{font-size:16px;font-weight:800;color:#4DC9C2;margin-bottom:16px;}
.habit-modal input{width:100%;font-family:var(--font);font-size:14px;font-weight:600;padding:9px 12px;border:2px solid rgba(77,201,194,0.3);border-radius:10px;color:#fff;background:rgba(20,40,80,0.6);outline:none;margin-bottom:10px;}
.habit-modal input:focus{border-color:rgba(77,201,194,0.7);}
.habit-icon-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.icon-opt{width:36px;height:36px;border-radius:8px;border:2px solid rgba(77,201,194,0.2);background:rgba(13,27,62,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;}
.icon-opt:hover,.icon-opt.sel{border-color:#4DC9C2;background:rgba(77,201,194,0.15);}
.habit-modal-row{display:flex;gap:8px;justify-content:flex-end;}
.habit-modal-cancel{font-family:var(--font);font-size:13px;font-weight:700;padding:8px 16px;border-radius:10px;border:2px solid rgba(77,201,194,0.2);background:rgba(20,40,80,0.5);color:#8AA8CC;cursor:pointer;}
.habit-modal-save{font-family:var(--font);font-size:13px;font-weight:800;padding:8px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#4DC9C2,#2BA8A0);color:#0D1B3E;cursor:pointer;}

/* ===== MAIN CALENDAR — fills remaining space ===== */
.cal-area{background:rgba(13,27,62,0.92);backdrop-filter:blur(8px);border-radius:var(--card-r);padding:20px;border:2px solid rgba(77,201,194,0.3);min-height:600px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.cal-title{font-size:22px;font-weight:800;color:#4DC9C2;}
.view-tabs{display:flex;gap:4px;}
.vtab{font-family:var(--font);font-size:13px;font-weight:700;padding:7px 14px;border-radius:10px;border:2px solid rgba(77,201,194,0.3);cursor:pointer;background:none;color:#8AA8CC;transition:.15s;}
.vtab.active{background:linear-gradient(135deg,#1A4A5A,#0D3040);color:#4DC9C2;border-color:rgba(77,201,194,0.6);}
.cal-nav{display:flex;gap:6px;align-items:center;}
.nav-btn{font-family:var(--font);font-size:16px;font-weight:700;background:rgba(20,40,80,0.6);border:2px solid rgba(77,201,194,0.3);border-radius:10px;padding:6px 14px;cursor:pointer;color:#4DC9C2;transition:.15s;}
.nav-btn:hover{background:rgba(77,201,194,0.15);}
.nav-today{font-size:13px;font-weight:700;}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:0;border:2.5px solid rgba(77,201,194,0.6);border-radius:16px;overflow:hidden;}
.day-label{text-align:center;font-size:13px;font-weight:800;color:#4DC9C2;padding:10px 0;background:rgba(20,50,100,0.85);border-right:2px solid rgba(77,201,194,0.4);border-bottom:2.5px solid rgba(77,201,194,0.6);width:100%;min-width:0;overflow:hidden;}
.day-label:last-child{border-right:none;}
.day-cell{min-height:100px;padding:6px;cursor:pointer;transition:.15s;border-right:1.5px solid rgba(77,201,194,0.3);border-bottom:1.5px solid rgba(77,201,194,0.3);background:rgba(13,27,62,0.6);width:100%;min-width:0;overflow:hidden;}
.day-cell:nth-child(7n){border-right:none;}
.day-cell:hover{background:rgba(77,201,194,0.1);}
.day-cell.other{opacity:.3;background:rgba(5,14,36,0.4);}
.day-cell.today{background:linear-gradient(135deg,rgba(214,48,49,0.15),rgba(160,16,16,0.1));border-color:rgba(214,48,49,0.4)!important;}
.day-num{font-size:14px;font-weight:800;color:#FFF;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.day-cell.today .day-num{background:linear-gradient(135deg,#D63031,#A01010);color:#FFF;}
.day-cell.selected{background:rgba(77,201,194,0.12);}
.event-chip{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px;margin-top:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
.event-chip:hover{opacity:.8;}
.chip-meeting{background:rgba(160,144,232,0.3);color:#DDD6FF;border:1px solid rgba(160,144,232,0.5);}
.chip-personal{background:rgba(255,160,200,0.25);color:#FFB8D8;border:1px solid rgba(255,160,200,0.5);}
.chip-work{background:rgba(77,201,194,0.2);color:#80FFD0;border:1px solid rgba(77,201,194,0.4);}
.chip-done{opacity:.4;text-decoration:line-through;}
.chip-health{background:rgba(255,200,80,0.2);color:#FFE87A;border:1px solid rgba(255,200,80,0.4);}
.chip-travel{background:rgba(110,198,255,0.2);color:#6EC6FF;border:1px solid rgba(110,198,255,0.4);}
.more-chip{font-size:10px;color:#4DC9C2;padding:1px 4px;cursor:pointer;font-weight:700;}

/* Week view */
.week-grid{display:grid;grid-template-columns:48px repeat(7,1fr);gap:0;}
.week-day-head{text-align:center;padding:4px;border-radius:8px;margin:2px;}
.week-day-name{font-size:11px;font-weight:700;color:#8AA8CC;}
.week-day-num{font-size:18px;font-weight:800;color:#C8D8F0;}
.week-day-num.today{background:linear-gradient(135deg,#D63031,#A01010);color:#FFF;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.hour-cell{height:48px;border-top:1.5px solid rgba(77,201,194,0.2);border-left:1.5px solid rgba(77,201,194,0.15);position:relative;background:rgba(13,27,62,0.5);}
.hour-label{height:48px;border-top:1.5px solid rgba(77,201,194,0.2);display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;padding-top:2px;font-size:11px;color:var(--text3);}

/* Day view */
.day-header-big{text-align:center;padding:12px;margin-bottom:12px;}
.day-big-num{font-size:52px;font-weight:800;color:#4DC9C2;}
.day-big-name{font-size:15px;color:#8AA8CC;font-weight:600;}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,14,36,0.75);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:rgba(13,27,62,0.99);border:2px solid rgba(77,201,194,0.4);border-radius:24px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,10,40,0.7);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:19px;font-weight:800;color:#4DC9C2;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#8AA8CC;padding:4px 8px;border-radius:8px;}
.modal-close:hover{background:rgba(77,201,194,0.15);}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:700;color:#C8D8F0;margin-bottom:5px;display:block;}
.form-input{width:100%;font-family:var(--font);font-size:14px;font-weight:600;padding:9px 12px;border:2px solid rgba(77,201,194,0.3);border-radius:10px;color:#FFF;background:rgba(20,40,80,0.6);outline:none;transition:.15s;}
.form-input:focus{border-color:rgba(77,201,194,0.7);background:rgba(25,50,100,0.8);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.btn-save{background:linear-gradient(135deg,#1A4A5A,#0D3040);color:#4DC9C2;border:2px solid rgba(77,201,194,0.6);border-radius:10px;font-family:var(--font);font-weight:800;font-size:14px;padding:10px 20px;cursor:pointer;}
.btn-cancel{background:rgba(20,40,80,0.5);color:#8AA8CC;border:2px solid rgba(77,201,194,0.2);border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;padding:10px 20px;cursor:pointer;}
.btn-done-mark{background:linear-gradient(135deg,#0A3020,#0A2840);color:#80FFD0;border:2px solid rgba(128,255,208,0.3);border-radius:10px;font-family:var(--font);font-weight:800;font-size:14px;padding:10px 16px;cursor:pointer;}
.btn-delete{background:rgba(255,80,80,0.15);color:#FF8080;border:2px solid rgba(255,80,80,0.35);border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;padding:10px 16px;cursor:pointer;}
.map-link{display:flex;align-items:center;gap:6px;font-size:12px;color:#4DC9C2;text-decoration:none;padding:4px 8px;background:rgba(77,201,194,0.1);border-radius:8px;margin-top:4px;width:fit-content;font-weight:700;}
.gcal-hint{background:rgba(20,50,100,0.5);border-radius:12px;padding:12px;font-size:13px;color:#C8D8F0;margin-bottom:10px;border:1.5px solid rgba(77,201,194,0.25);font-weight:600;}
.gcal-hint a{color:#4DC9C2;font-weight:700;}
.ved-label{font-size:12px;font-weight:700;color:#8AA8CC;margin-bottom:2px;}
.ved-val{font-size:14px;color:#FFF;font-weight:600;}
.view-event-detail{margin-bottom:10px;}

/* Planets */
.planet{position:fixed;pointer-events:none;z-index:0;border-radius:50%;}
.p1{width:140px;height:140px;background:radial-gradient(circle,#1A4A5A,#0D2030);border:2px solid rgba(77,201,194,0.2);opacity:.35;top:5%;right:5%;}
.p2{width:90px;height:90px;background:radial-gradient(circle,#1A2A40,#0A1828);border:2px solid rgba(77,201,194,0.15);opacity:.3;bottom:15%;left:3%;}
.p3{width:60px;height:60px;background:radial-gradient(circle,#D63031,#7A0A0A);border:2px solid rgba(255,80,80,0.25);opacity:.25;top:40%;right:2%;}

/* Toast */
.toast{position:fixed;bottom:180px;right:24px;background:rgba(13,27,62,0.98);border-radius:14px;padding:12px 18px;box-shadow:0 8px 32px rgba(0,10,40,0.6);font-size:14px;font-weight:700;color:#FFF;z-index:9999;transform:translateY(80px);opacity:0;transition:.3s;display:flex;align-items:center;gap:8px;max-width:300px;border:2px solid rgba(77,201,194,0.4);}
.toast.show{transform:translateY(0);opacity:1;}
.empty-day{text-align:center;padding:20px;color:var(--text3);font-size:13px;font-weight:600;}
.float-star{position:fixed;pointer-events:none;z-index:0;font-size:16px;animation:floatStar linear infinite;}

/* ===== MICKEY MASCOT — locked bottom right ===== */
#mickey-wrap{
  position:fixed;z-index:10;
  right:24px;bottom:24px;
  pointer-events:none;  /* no drag */
  cursor:default;
  user-select:none;
}
.mickey-svg{filter:drop-shadow(0 4px 20px rgba(77,201,194,0.7)) drop-shadow(0 0 10px rgba(255,255,255,0.2));}
.mickey-speech{
  position:absolute;top:-70px;right:0px;
  background:#FFFFFF;border-radius:16px 16px 4px 16px;
  padding:8px 14px;font-size:12px;font-weight:800;color:#0D1B3E;
  white-space:nowrap;border:2px solid #0D1B3E;
  pointer-events:none;animation:speech-pop 2.5s ease-in-out infinite;
}
.mickey-speech::after{content:'';position:absolute;bottom:-10px;right:14px;border:5px solid transparent;border-top-color:#0D1B3E;}
.mickey-speech::before{content:'';position:absolute;bottom:-8px;right:14px;border:5px solid transparent;border-top-color:#FFF;z-index:1;}
.mickey-star{position:absolute;top:-14px;left:-10px;font-size:16px;animation:star-spin 2.5s ease-in-out infinite;}

/* ===== ANIMATIONS ===== */
@keyframes floatStar{0%{transform:translateY(0) rotate(0deg);opacity:.7;}50%{transform:translateY(-18px) rotate(20deg);opacity:1;}100%{transform:translateY(0) rotate(0deg);opacity:.7;}}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
@keyframes pulse-logo{0%,100%{text-shadow:0 0 0px #4DC9C2;}50%{text-shadow:0 0 12px #4DC9C2,0 0 24px #80FFE0;}}
@keyframes speech-pop{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes star-spin{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.3);}100%{transform:rotate(360deg) scale(1);}}
@keyframes mickey-idle{0%,100%{transform:translateY(0px);}50%{transform:translateY(-10px);}}
@keyframes sparkle-in{0%{transform:scale(.5) translateY(20px);opacity:0;}60%{transform:scale(1.08) translateY(-4px);opacity:1;}100%{transform:scale(1) translateY(0);opacity:1;}}
.toast.show{animation:sparkle-in .35s ease forwards;}

// ====================================================
// AUDIO + TOAST
// ====================================================
function playTing(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='add'){o.frequency.setValueAtTime(880,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(1320,ctx.currentTime+.08);}
    else if(type==='done'){o.frequency.setValueAtTime(660,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(990,ctx.currentTime+.12);}
    else if(type==='delete'){o.frequency.setValueAtTime(440,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(220,ctx.currentTime+.15);}
    else{o.frequency.setValueAtTime(1046,ctx.currentTime);}
    o.type='sine';g.gain.setValueAtTime(.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45);
    o.start();o.stop(ctx.currentTime+.45);
  }catch(e){}
}
function showToast(msg,icon,sound){
  playTing(sound||'default');
  const t=document.getElementById('toast');
  if(!t)return;
  t.innerHTML=(icon?icon+' ':'')+msg;
  t.classList.remove('show');void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ====================================================
function startGapi(){
  if(typeof gapi==='undefined'){setTimeout(startGapi,150);return;}
  gapi.load('client',function(){
    gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest']})
      .then(function(){gapiLoaded=true;tryRestoreSession();})
      .catch(function(e){console.warn('gapi init warn:',e);gapiLoaded=true;tryRestoreSession();});
  });
}
function startGis(){
  if(typeof google==='undefined'){setTimeout(startGis,150);return;}
  tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,
    scope:SCOPES,
    callback:function(resp){
      if(resp.error){showToast('เชื่อมไม่สำเร็จ ลองใหม่นะ','','default');return;}
      accessToken=resp.access_token;
      gapi.client.setToken({access_token:accessToken});
      localStorage.setItem('gcal-token',accessToken);localStorage.setItem('gcal-token-time',Date.now());
      setGCalStatus(true);
      refreshAll();
      if(!window._gcalTimer)window._gcalTimer=setInterval(autoRefreshWithRetry,30000);
    }
  });
  gisLoaded=true;
}
function tryRestoreSession(){
  const stored=localStorage.getItem('gcal-token');
  const tokenTime=parseInt(localStorage.getItem('gcal-token-time')||'0');
  const ageMin=(Date.now()-tokenTime)/60000;
  if(stored&&gapiLoaded){
    gapi.client.setToken({access_token:stored});
    accessToken=stored;
    setGCalStatus(true);
    refreshAll().then(function(ok){
      if(!ok){
        // Token likely expired — try silent re-auth (no popup if already granted before)
        silentReauth();
      }
    });
    if(!window._gcalTimer)window._gcalTimer=setInterval(autoRefreshWithRetry,30000);
  }
}

function silentReauth(){
  if(!gisLoaded||!tokenClient)return;
  try{
    tokenClient.requestAccessToken({prompt:'none'});
  }catch(e){
    console.warn('silentReauth failed, user must click connect again:',e);
    setGCalStatus(false);
  }
}

function autoRefreshWithRetry(){
  refreshAll().then(function(ok){
    if(!ok)silentReauth();
  });
}
startGapi();
startGis();

    showToast('กำลังโหลด Google API...','','default');

// ====================================================

// ====================================================
// JSONP-based calls to bypass CORS restrictions with Apps Script
function jsonpCall(url){
  return new Promise(function(resolve){
    const cbName='jsonp_cb_'+Date.now()+'_'+Math.floor(Math.random()*10000);
    window[cbName]=function(data){
      resolve(data);
      delete window[cbName];
      script.remove();
    };
    const script=document.createElement('script');
    script.src=url+(url.indexOf('?')>-1?'&':'?')+'callback='+cbName;
    script.onerror=function(){
      console.error('[jsonpCall] script load failed for:',url);
      resolve({error:'jsonp load failed'});
      delete window[cbName];
      script.remove();
    };
    document.body.appendChild(script);
    setTimeout(function(){
      if(window[cbName]){
        console.warn('[jsonpCall] timeout for:',url);
        resolve({error:'timeout'});
        delete window[cbName];
        if(script.parentNode)script.remove();
      }
    },10000);
  });
}

function sheetGet(){
  console.log('[sheetGet] fetching via JSONP...');
  return jsonpCall(SHEET_URL+'?action=get').then(function(data){
    console.log('[sheetGet] received:',data&&typeof data,Object.keys(data||{}).length,'keys');
    sheetData=data&&!data.error?data:{};
    return sheetData;
  });
}
function sheetSet(row){
  // If attach is a large base64 string, the GET/JSONP URL would exceed length limits.
  // Use a hidden iframe + form POST instead, which has no such limit.
  const attachVal=row.attachUrl||'';
  const isLargeBase64=attachVal.length>1500;
  if(isLargeBase64){
    return sheetSetViaForm(row);
  }
  const params=new URLSearchParams(row);
  const url=SHEET_URL+'?action=set&'+params.toString();
  console.log('[sheetSet] calling via JSONP, len:',url.length);
  return jsonpCall(url).then(function(data){
    console.log('[sheetSet] result:',data);
    return data;
  });
}

function sheetSetViaForm(row){
  return new Promise(function(resolve){
    const iframeName='upload_frame_'+Date.now();
    const iframe=document.createElement('iframe');
    iframe.name=iframeName;
    iframe.style.display='none';
    document.body.appendChild(iframe);

    const form=document.createElement('form');
    form.method='POST';
    form.action=SHEET_URL;
    form.target=iframeName;
    form.style.display='none';

    Object.keys(row).forEach(function(key){
      const input=document.createElement('input');
      input.type='hidden';
      input.name=key;
      input.value=row[key]||'';
      form.appendChild(input);
    });
    const actionInput=document.createElement('input');
    actionInput.type='hidden';actionInput.name='action';actionInput.value='set';
    form.appendChild(actionInput);

    document.body.appendChild(form);
    console.log('[sheetSetViaForm] submitting POST with',Object.keys(row).length,'fields, attach length:',(row.attachUrl||'').length);

    let resolved=false;
    iframe.onload=function(){
      if(resolved)return;
      resolved=true;
      console.log('[sheetSetViaForm] iframe loaded, assuming success');
      setTimeout(function(){
        form.remove();iframe.remove();
      },500);
      resolve({success:true});
    };
    form.submit();

    setTimeout(function(){
      if(!resolved){
        resolved=true;
        console.warn('[sheetSetViaForm] timeout, assuming success anyway');
        form.remove();iframe.remove();
        resolve({success:true,timeout:true});
      }
    },8000);
  });
}
function sheetDelete(gcalId){
  const url=SHEET_URL+'?action=delete&gcalId='+encodeURIComponent(gcalId);
  return jsonpCall(url);
}

// ====================================================
// LOAD EVENTS — merge GCal + Sheet
// ====================================================
async function refreshAll(){
  if(!accessToken)return false;
  try{
    const now=new Date();
    const timeMin=new Date(now.getFullYear(),now.getMonth()-2,1).toISOString();
    const timeMax=new Date(now.getFullYear(),now.getMonth()+4,0).toISOString();

    // Get calendars
    let cals=[{id:'primary',summary:'Primary'}];
    try{
      const r=await gapi.client.request({path:'https://www.googleapis.com/calendar/v3/users/me/calendarList',params:{minAccessRole:'reader'}});
      if(r.result.items)cals=r.result.items;
    }catch(e){console.warn('calendarList failed',e);}

    const fetches=cals.map(cal=>
      gapi.client.request({
        path:'https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(cal.id)+'/events',
        params:{timeMin,timeMax,singleEvents:true,orderBy:'startTime',maxResults:250}
      }).then(r=>(r.result.items||[]).map(function(it){it._calId=cal.id;return it;}))
        .catch(()=>[])
    );
    const all=(await Promise.all(fetches)).flat();

    // Dedup by id
    const seen=new Set();
    const deduped=all.filter(function(item){
      if(!item.id||seen.has(item.id))return false;
      seen.add(item.id);return true;
    });

    // Load sheet data in parallel
    await sheetGet();

    events=deduped.map(function(item){
      const start=item.start.dateTime||item.start.date||'';
      const end=item.end.dateTime||item.end.date||'';
      const dateStr=start.substring(0,10);
      const timeStr=item.start.dateTime?start.substring(11,16):'';
      const timeEndStr=item.end.dateTime?end.substring(11,16):'';
      const sheetRow=sheetData[item.id]||{};
      const isDone=(item.summary||'').indexOf('✅')===0;
      // Clean note: strip out any leaked metadata lines (legacy data safety net)
      let cleanNote=sheetRow.note||item.description||'';
      let extractedLink=sheetRow.link||'';
      let extractedMap=sheetRow.mapUrl||'';
      let extractedContactName=sheetRow.contactName||'';
      let extractedContactPhone=sheetRow.contactPhone||'';
      // Decode any literal %0A or %20 that leaked in from old buggy saves
      if(cleanNote&&cleanNote.indexOf('%0A')>-1){
        cleanNote=cleanNote.replace(/%0A/g,'\n').replace(/%20/g,' ');
      }
      // If note still contains metadata markers, extract and strip them (covers old/dirty rows)
      if(cleanNote){
        // Flexible match: works with or without label text after the emoji
        const linkM=cleanNote.match(/🔗\s*(?:ลิ้งค์[^\s:]*:?)?\s*(https?:\/\/\S+)/);
        if(linkM&&!extractedLink){extractedLink=linkM[1];}
        const mapM=cleanNote.match(/🗺️\s*(?:แผนที่[^\s:]*:?)?\s*(https?:\/\/\S+)/);
        if(mapM&&!extractedMap){extractedMap=mapM[1];}
        const nameM=cleanNote.match(/👤\s*(?:ติดต่อ:?\s*)?([^\n🔗🗺️📱📡]+)/);
        if(nameM&&!extractedContactName){extractedContactName=nameM[1].trim();}
        const phoneM=cleanNote.match(/📱\s*(?:เบอร์:?\s*)?([^\n🔗🗺️👤📡]+)/);
        if(phoneM&&!extractedContactPhone){extractedContactPhone=phoneM[1].trim();}
        // Catch any remaining bare URL that wasn't caught above (fallback safety net)
        if(!extractedLink){
          const bareUrl=cleanNote.match(/(https?:\/\/\S+)/);
          if(bareUrl)extractedLink=bareUrl[1];
        }
        // Strip all metadata lines/fragments from note, keep only the free-text part
        cleanNote=cleanNote
          .replace(/👤[^\n🔗🗺️📱📡]*/g,'')
          .replace(/📱[^\n🔗🗺️👤📡]*/g,'')
          .replace(/📡[^\n🔗🗺️👤📱]*/g,'')
          .replace(/🔗\s*(?:ลิ้งค์[^\s:]*:?)?\s*https?:\/\/\S+/g,'')
          .replace(/🗺️\s*(?:แผนที่[^\s:]*:?)?\s*https?:\/\/\S+/g,'')
          .replace(/https?:\/\/\S+/g,'') // catch any remaining bare URLs
          .replace(/\n{2,}/g,'\n')
          .replace(/^[\s·]+|[\s·]+$/g,'')
          .trim();
      }
      return {
        id:item.id,
        gcalId:item.id,
        calId:item._calId||'primary',
        title:(item.summary||'(ไม่มีชื่อ)').replace(/^✅\s*/,''),
        date:sheetRow.date||dateStr,
        time:sheetRow.timeStart||timeStr,
        timeEnd:sheetRow.timeEnd||timeEndStr,
        cat:sheetRow.category||'work',
        contactName:extractedContactName,
        contactPhone:extractedContactPhone,
        contactMethod:sheetRow.contactMethod||'',
        loc:sheetRow.location||item.location||'',
        mapUrl:extractedMap,
        note:cleanNote,
        link:extractedLink,
        attach:sheetRow.attachUrl||'',
        done:sheetRow.done==='true'||sheetRow.done===true||isDone
      };
    });

    setView(curView);renderSummary();checkNotifications();
    setGCalStatus(true);
    return true;
  }catch(e){
    console.error('refreshAll:',e);
    if(e.status===401){accessToken=null;localStorage.removeItem('gcal-token');localStorage.removeItem('gcal-token-time');setGCalStatus(false);}
    return false;
  }
}

// ====================================================
// GCAL WRITE (create/update/delete)
// ====================================================
function buildGCalBody(ev){
  const startDT=ev.time?ev.date+'T'+ev.time+':00+07:00':ev.date;
  const endDT=ev.timeEnd?ev.date+'T'+ev.timeEnd+':00+07:00':startDT;
  const lines=[];
  if(ev.note)lines.push(ev.note);
  if(ev.contactName||ev.contactPhone||ev.contactMethod){
    let c=[];
    if(ev.contactName)c.push('👤 '+ev.contactName);
    if(ev.contactPhone)c.push('📱 '+ev.contactPhone);
    if(ev.contactMethod)c.push(CONTACT_METHODS[ev.contactMethod]||ev.contactMethod);
    lines.push(c.join(' · '));
  }
  // URLs go on their OWN line with no label text touching them,
  // so Google Calendar auto-detects and makes them clickable
  if(ev.link){lines.push('🔗 ลิ้งค์งาน:');lines.push(ev.link);}
  if(ev.mapUrl){lines.push('🗺️ แผนที่:');lines.push(ev.mapUrl);}
  return {
    summary:(ev.done?'✅ ':'')+ev.title,
    location:ev.loc||'',
    description:lines.join('\n'),
    start:ev.time?{dateTime:startDT,timeZone:'Asia/Bangkok'}:{date:ev.date},
    end:ev.timeEnd?{dateTime:endDT,timeZone:'Asia/Bangkok'}:{date:ev.date}
  };
}

async function addToGCal(ev){
  if(!accessToken)return null;
  try{
    const body=buildGCalBody(ev);
    const r=await gapi.client.calendar.events.insert({calendarId:'primary',resource:body});
    return r.result.id;
  }catch(e){console.error('addToGCal:',e);return null;}
}
async function updateInGCal(ev){
  if(!accessToken||!ev.gcalId)return false;
  const body=buildGCalBody(ev);
  const targetCal=ev.calId||'primary';
  try{
    await gapi.client.calendar.events.update({calendarId:targetCal,eventId:ev.gcalId,resource:body});
    return true;
  }catch(e1){
    if(targetCal!=='primary'){
      try{
        await gapi.client.calendar.events.update({calendarId:'primary',eventId:ev.gcalId,resource:body});
        return true;
      }catch(e2){}
    }
    console.error('updateInGCal failed:',e1);
    return false;
  }
}
async function deleteFromGCal(ev){
  if(!accessToken||!ev.gcalId)return;
  const targetCal=ev.calId||'primary';
  try{await gapi.client.calendar.events.delete({calendarId:targetCal,eventId:ev.gcalId});}
  catch(e1){
    if(targetCal!=='primary'){
      try{await gapi.client.calendar.events.delete({calendarId:'primary',eventId:ev.gcalId});}catch(e2){}
    }
  }
}

// SAVE / EDIT / DELETE / DONE
// ====================================================
async function saveEvent(){
  const title=(document.getElementById('f-title')&&document.getElementById('f-title').value||'').trim();
  if(!title){showToast('กรุณาใส่ชื่อนัดหมาย','⚠️');return;}
  const catVal=document.getElementById('f-cat').value||'work';
  const catFinal=catVal==='other'?((document.getElementById('f-cat-other').value||'').trim()||'other'):catVal;
  const tsh=document.getElementById('f-time-h').value||'';
  const tsm=document.getElementById('f-time-m').value||'';
  const timeStart=(tsh&&tsm)?tsh+':'+tsm:'';
  const teh=document.getElementById('f-timeEnd-h').value||'';
  const tem=document.getElementById('f-timeEnd-m').value||'';
  const timeEnd=(teh&&tem)?teh+':'+tem:'';

  const origEv=editId?events.find(function(x){return x.id===editId;}):null;
  const isEdit=!!editId;

  const ev={
    id:editId||null,
    gcalId:origEv?origEv.gcalId:null,
    calId:origEv?(origEv.calId||'primary'):'primary',
    title:title,
    date:document.getElementById('f-date').value||'',
    time:timeStart,timeEnd:timeEnd,
    cat:catFinal,
    contactName:document.getElementById('f-contact-name').value||'',
    contactPhone:document.getElementById('f-contact-phone').value||'',
    contactMethod:document.getElementById('f-contact-method').value||'',
    loc:document.getElementById('f-loc').value||'',
    mapUrl:document.getElementById('f-map').value||'',
    note:document.getElementById('f-note').value||'',
    link:document.getElementById('f-link').value||'',
    attach:document.getElementById('f-attach').value||'',
    done:origEv?origEv.done:false
  };

  if(!ev.date){showToast('กรุณาเลือกวันที่','⚠️');return;}

  // Open GCal popup IMMEDIATELY (synchronously) for new events,
  // before any await — otherwise browser popup blockers kill it
  let gcalWindowRef=null;
  if(!isEdit){
    const d=ev.date.replace(/-/g,'');
    function p(t){if(!t)return'000000';const parts=t.split(':');return parts[0].padStart(2,'0')+parts[1].padStart(2,'0')+'00';}
    const tS=ev.time?p(ev.time):'000000';
    const tE=ev.timeEnd?p(ev.timeEnd):p(ev.time);
    const detParts=[];
    if(ev.note)detParts.push(ev.note);
    if(ev.contactName)detParts.push('👤 '+ev.contactName);
    if(ev.link)detParts.push('🔗 '+ev.link);
    const gcalUrl='https://calendar.google.com/calendar/render?action=TEMPLATE'
      +'&text='+encodeURIComponent(ev.title)
      +'&dates='+d+'T'+tS+'/'+d+'T'+tE
      +'&location='+encodeURIComponent(ev.loc||'')
      +'&details='+encodeURIComponent(detParts.join('%0A'))
      +'&ctz=Asia%2FBangkok';
    gcalWindowRef=window.open(gcalUrl,'_blank');
    if(!gcalWindowRef){
      showToast('เบราว์เซอร์บล็อก popup — กรุณาอนุญาต popup สำหรับเว็บนี้','⚠️','default');
    }
  }

  showToast('กำลังบันทึก...','','default');
  closeModal();

  let gcalId=ev.gcalId;
  if(isEdit){
    const updated=await updateInGCal(ev);
    if(!updated)showToast('อัปเดต GCal ไม่สำเร็จ แต่จะลองเซฟข้อมูลต่อ','','default');
  }else{
    gcalId=await addToGCal(ev);
  }

  if(gcalId){
    await sheetSet({
      gcalId:gcalId,
      title:ev.title,date:ev.date,timeStart:ev.time,timeEnd:ev.timeEnd,
      category:ev.cat,
      contactName:ev.contactName,contactPhone:ev.contactPhone,contactMethod:ev.contactMethod,
      location:ev.loc,mapUrl:ev.mapUrl,note:ev.note,link:ev.link,attachUrl:ev.attach,
      done:ev.done?'true':'false'
    });
  }

  await refreshAll();
  showToast(isEdit?'แก้ไขแล้ว ✨':'เพิ่มแล้ว 🐭','',isEdit?'default':'add');
}

async function markDone(id){
  const ev=events.find(function(x){return x.id===id;});if(!ev)return;
  ev.done=!ev.done;
  closeModal();
  showToast(ev.done?'เสร็จแล้ว! 🎉':'ยกเลิกเสร็จแล้ว','',ev.done?'done':'default');
  await updateInGCal(ev);
  await sheetSet({
    gcalId:ev.gcalId,
    title:ev.title,date:ev.date,timeStart:ev.time,timeEnd:ev.timeEnd,
    category:ev.cat,
    contactName:ev.contactName,contactPhone:ev.contactPhone,contactMethod:ev.contactMethod,
    location:ev.loc,mapUrl:ev.mapUrl,note:ev.note,link:ev.link,attachUrl:ev.attach,
    done:ev.done?'true':'false'
  });
  await refreshAll();
}

async function deleteEvent(id){
  if(!confirm('ลบนัดหมายนี้?'))return;
  const ev=events.find(function(x){return x.id===id;});
  closeModal();
  if(ev){
    await deleteFromGCal(ev);
    await sheetDelete(ev.gcalId);
  }
  await refreshAll();
  showToast('ลบแล้ว 🗑️','','delete');
}

function formatNoteLinks(text){
  if(!text)return '';
  let escaped=esc(text);
  // Put URLs on their own line, replace with clickable short link
  escaped=escaped.replace(/(https?:\/\/[^\s]+)/g,function(url){
    const short=url.length>50?url.substring(0,50)+'…':url;
    return '<br><a href="'+url+'" target="_blank" rel="noopener" style="color:#4DC9C2;text-decoration:underline;word-break:break-all">'+short+'</a>';
  });
  // Also break before emoji-prefixed metadata lines if jammed together
  escaped=escaped.replace(/(👤|📱|📡|🔗|🗺️)/g,'<br>$1');
  return escaped;
}
function row(label,val){return '<div class="view-event-detail"><div class="ved-label">'+label+'</div><div class="ved-val">'+val+'</div></div>';}
function linkBtn(url,label){
  const short=url.length>50?url.substring(0,50)+'…':url;
  return '<a href="'+url+'" target="_blank" rel="noopener" style="color:#4DC9C2;font-weight:700;word-break:break-all;text-decoration:none;background:rgba(77,201,194,0.1);padding:6px 14px;border-radius:8px;display:inline-block;border:1.5px solid rgba(77,201,194,0.3);margin-top:2px">'+(label||'🌐 '+short)+' ↗</a>';
}

function viewEvent(id,e){
  if(e)e.stopPropagation();
  const ev=events.find(function(x){return x.id===id;});if(!ev)return;
  const cat=CATS[ev.cat]||CATS.work;

  let body='<div style="background:'+cat.bg+'30;border-radius:14px;padding:14px;margin-bottom:14px;border:1.5px solid '+cat.color+'30">';
  body+='<div style="font-size:19px;font-weight:800;color:#fff;margin-bottom:4px'+(ev.done?';text-decoration:line-through;opacity:.6':'')+'">'+esc(ev.title)+'</div>';
  body+='<div style="display:flex;gap:8px;flex-wrap:wrap">';
  body+='<div style="font-size:13px;font-weight:700;color:'+cat.color+';background:'+cat.bg+';display:inline-block;padding:3px 10px;border-radius:6px">'+cat.label+'</div>';
  if(ev.done)body+='<div style="font-size:13px;font-weight:700;color:#205040;background:#B8F0D8;display:inline-block;padding:3px 10px;border-radius:6px">✅ เสร็จแล้ว</div>';
  body+='</div></div>';

  if(ev.date)body+=row('📅 วันที่',ev.date);
  if(ev.time)body+=row('🕐 เวลา',ev.time+(ev.timeEnd?' — '+ev.timeEnd:''));
  if(ev.contactName||ev.contactPhone||ev.contactMethod){
    let cVal=[];
    if(ev.contactName)cVal.push(esc(ev.contactName));
    if(ev.contactPhone)cVal.push('<a href="tel:'+ev.contactPhone+'" style="color:#4DC9C2">📱 '+esc(ev.contactPhone)+'</a>');
    if(ev.contactMethod)cVal.push(CONTACT_METHODS[ev.contactMethod]||ev.contactMethod);
    body+=row('👤 ผู้ติดต่อ',cVal.join(' · '));
  }
  if(ev.loc)body+=row('📍 สถานที่',esc(ev.loc));
  if(ev.mapUrl)body+=row('🗺️ แผนที่',linkBtn(ev.mapUrl,'📍 เปิด Google Maps'));
  if(ev.note)body+=row('📝 บันทึก',formatNoteLinks(ev.note));
  if(ev.link)body+=row('🔗 ลิ้งค์งาน',linkBtn(ev.link));
  if(ev.attach){
    if(ev.attach.indexOf('data:image')===0||/\.(jpg|jpeg|png|gif|webp)(\?|$)/i.test(ev.attach)){
      body+=row('📎 ไฟล์แนบ','<img src="'+ev.attach+'" style="max-width:100%;max-height:200px;border-radius:10px;margin-top:4px;border:2px solid rgba(77,201,194,0.3)">');
    }else if(ev.attach.indexOf('http')===0){
      body+=row('📎 ไฟล์แนบ',linkBtn(ev.attach,'📄 เปิดไฟล์'));
    }
  }

  body+='<div class="modal-actions">';
  body+='<button class="btn-delete" id="vbtn-del">🗑️ ลบ</button>';
  body+='<button class="btn-cancel" id="vbtn-done">'+(ev.done?'↩️ ยกเลิกเสร็จ':'✅ Done')+'</button>';
  body+='<button class="btn-save" id="vbtn-edit">✏️ แก้ไข</button>';
  body+='</div>';

  document.getElementById('modal-title').textContent='🌸 รายละเอียด';
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal').style.display='flex';

  const evId=ev.id;
  const bdel=document.getElementById('vbtn-del');
  const bdone=document.getElementById('vbtn-done');
  const bedit=document.getElementById('vbtn-edit');
  if(bdel)bdel.onclick=function(){deleteEvent(evId);};
  if(bdone)bdone.onclick=function(){markDone(evId);};
  if(bedit)bedit.onclick=function(){editEvent(evId);};
}

function editEvent(id){
  const ev=events.find(function(x){return x.id===id;});if(!ev)return;
  editId=id;
  document.getElementById('modal-title').textContent='✏️ แก้ไขนัดหมาย';
  document.getElementById('modal-body').innerHTML=buildForm(ev);
}

// ====================================================
// MODAL OPEN/CLOSE
// ====================================================
function openAddModal(dateStr){
  if(!accessToken){showToast('กรุณากด "เชื่อม Google Calendar" ก่อนนะ 🗓️','','default');return;}
  editId=null;
  const d=dateStr||fmt(curDate.getFullYear(),curDate.getMonth(),curDate.getDate());
  document.getElementById('modal-title').textContent='✨ เพิ่มนัดหมายใหม่';
  document.getElementById('modal-body').innerHTML=buildForm({date:d,cat:'meeting'});
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';editId=null;}
function closeModalOutside(e){if(e.target===document.getElementById('modal'))closeModal();}

// ====================================================
// CALENDAR RENDER
// ====================================================
function getTitle(){
  const M=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const D=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  if(curView==='month')return M[curDate.getMonth()]+' '+(curDate.getFullYear()+543);
  if(curView==='week'){const s=new Date(curDate);s.setDate(curDate.getDate()-curDate.getDay());const e2=new Date(s);e2.setDate(s.getDate()+6);return s.getDate()+' – '+e2.getDate()+' '+M[e2.getMonth()]+' '+(e2.getFullYear()+543);}
  return D[curDate.getDay()]+' '+curDate.getDate()+' '+M[curDate.getMonth()]+' '+(curDate.getFullYear()+543);
}

function renderMonth(){
  const y=curDate.getFullYear(),m=curDate.getMonth();
  const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  const today=new Date();
  const dL=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let h=dL.map(function(l){return '<div class="day-label">'+l+'</div>';}).join('');
  const pLast=new Date(y,m,0).getDate();
  for(let i=0;i<first;i++){const d=pLast-first+1+i;h+='<div class="day-cell other" onclick="openAddModal(\''+fmt(y,m-1,d)+'\')"><div class="day-num">'+d+'</div></div>';}
  for(let d=1;d<=last;d++){
    const ds=fmt(y,m,d);
    const isT=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    const isSel=ds===fmt(selectedDate.getFullYear(),selectedDate.getMonth(),selectedDate.getDate());
    const dayEvs=events.filter(function(ev){return ev.date===ds;}).sort(function(a,b){return a.time>b.time?1:-1;});
    let chips='';
    dayEvs.slice(0,3).forEach(function(ev){
      const c=CATS[ev.cat]?CATS[ev.cat].cls:'chip-work';
      chips+='<div class="event-chip '+c+(ev.done?' chip-done':'')+'" onclick="viewEvent(\''+ev.id+'\',event)">'+(ev.time?ev.time+' ':'')+esc(ev.title)+'</div>';
    });
    if(dayEvs.length>3)chips+='<div class="more-chip">+'+(dayEvs.length-3)+' อีก</div>';
    h+='<div class="day-cell'+(isT?' today':'')+(isSel?' selected':'')+'" onclick="openAddModal(\''+ds+'\')"><div class="day-num">'+d+'</div>'+chips+'</div>';
  }
  const rem=(first+last)%7===0?0:7-(first+last)%7;
  for(let d=1;d<=rem;d++)h+='<div class="day-cell other" onclick="openAddModal(\''+fmt(y,m+1,d)+'\')"><div class="day-num">'+d+'</div></div>';
  document.getElementById('cal-body').innerHTML='<div class="month-grid">'+h+'</div>';
}

function renderWeek(){
  const start=new Date(curDate);start.setDate(curDate.getDate()-curDate.getDay());
  const days=[];for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push(d);}
  const today=new Date();const dN=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let hdr='<div style="grid-column:1"></div>';
  days.forEach(function(d,i){const isT=d.toDateString()===today.toDateString();hdr+='<div class="week-day-head"><div class="week-day-name">'+dN[i]+'</div><div class="week-day-num'+(isT?' today':'')+'">'+d.getDate()+'</div></div>';});
  let body='';
  for(let hour=7;hour<21;hour++){
    body+='<div class="hour-label">'+hour+':00</div>';
    days.forEach(function(d){
      const ds=fmt(d.getFullYear(),d.getMonth(),d.getDate());
      const hEvs=events.filter(function(ev){return ev.date===ds&&ev.time&&parseInt(ev.time)===hour;});
      let inner='';
      hEvs.forEach(function(ev){
        const c=CATS[ev.cat]?CATS[ev.cat].cls:'chip-work';
        inner+='<div class="event-chip '+c+(ev.done?' chip-done':'')+'" style="margin:0 0 2px" onclick="viewEvent(\''+ev.id+'\',event)">'+ev.time+' '+esc(ev.title)+'</div>';
      });
      body+='<div class="hour-cell" onclick="openAddModal(\''+ds+'\')">'+inner+'</div>';
    });
  }
  document.getElementById('cal-body').innerHTML='<div class="week-grid" style="grid-template-columns:48px repeat(7,1fr)">'+hdr+body+'</div>';
}

function renderDay(){
  const ds=fmt(curDate.getFullYear(),curDate.getMonth(),curDate.getDate());
  const M2=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const D2=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const dayEvs=events.filter(function(ev){return ev.date===ds;}).sort(function(a,b){return a.time>b.time?1:-1;});
  let tl='';
  for(let hour=7;hour<21;hour++){
    const hEvs=dayEvs.filter(function(ev){return ev.time&&parseInt(ev.time)===hour;});
    tl+='<div style="font-size:11px;color:var(--text3);height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:4px;border-top:1.5px solid rgba(77,201,194,0.2);font-weight:600">'+hour+':00</div>';
    let inner='';
    hEvs.forEach(function(ev){
      const c=CATS[ev.cat]?CATS[ev.cat].cls:'chip-work';
      inner+='<div class="event-chip '+c+(ev.done?' chip-done':'')+'" style="padding:7px 10px;margin:2px 0;font-size:13px" onclick="viewEvent(\''+ev.id+'\',event)">'+ev.time+' '+esc(ev.title)+'</div>';
    });
    tl+='<div style="border-top:1.5px solid rgba(77,201,194,0.2);padding:2px 4px;min-height:52px" onclick="openAddModal(\''+ds+'\')">'+inner+'</div>';
  }
  document.getElementById('cal-body').innerHTML='<div class="day-header-big"><div class="day-big-name">'+D2[curDate.getDay()]+'</div><div class="day-big-num">'+curDate.getDate()+' '+M2[curDate.getMonth()]+' '+(curDate.getFullYear()+543)+'</div></div><div style="display:grid;grid-template-columns:48px 1fr">'+tl+'</div>'+(!dayEvs.length?'<div class="empty-day">🌙 ยังไม่มีนัดหมายวันนี้</div>':'');
}

function setView(v,el){
  curView=v;
  document.querySelectorAll('.vtab').forEach(function(t){t.classList.remove('active');});
  if(el)el.classList.add('active');
  document.getElementById('cal-title').textContent=getTitle();
  if(v==='month')renderMonth();
  else if(v==='week')renderWeek();
  else renderDay();
}
function navPrev(){
  if(curView==='month')curDate=new Date(curDate.getFullYear(),curDate.getMonth()-1,1);
  else if(curView==='week')curDate=new Date(curDate.getTime()-7*86400000);
  else curDate=new Date(curDate.getTime()-86400000);
  setView(curView);
}
function navNext(){
  if(curView==='month')curDate=new Date(curDate.getFullYear(),curDate.getMonth()+1,1);
  else if(curView==='week')curDate=new Date(curDate.getTime()+7*86400000);
  else curDate=new Date(curDate.getTime()+86400000);
  setView(curView);
}
function goToday(){curDate=new Date();selectedDate=new Date();setView(curView);}

// ====================================================
// SUMMARY
// ====================================================
function setSumTab(tab,el){
  sumTab=tab;
  document.querySelectorAll('.stab').forEach(function(t){t.classList.remove('active');});
  if(el)el.classList.add('active');
  renderSummary();
}
function renderSummary(){
  const today=new Date(),ty=today.getFullYear(),tm=today.getMonth();
  let filtered=[];
  if(sumTab==='day')filtered=events.filter(function(e){return e.date===fmt(ty,tm,today.getDate());});
  else if(sumTab==='week'){const ws=new Date(today);ws.setDate(today.getDate()-today.getDay());const we=new Date(ws);we.setDate(ws.getDate()+6);filtered=events.filter(function(e){const d=new Date(e.date);return d>=ws&&d<=we;});}
  else if(sumTab==='month')filtered=events.filter(function(e){return e.date.indexOf(fmt(ty,tm,1).substring(0,7))===0;});
  else filtered=events.filter(function(e){return e.date.indexOf(ty+'')===0;});
  const done=filtered.filter(function(e){return e.done;}).length;
  let h='<div class="summary-stat"><span>ทั้งหมด</span><span class="stat-num">'+filtered.length+'</span></div><div class="summary-stat"><span>✅ เสร็จ</span><span class="stat-num">'+done+'</span></div><div class="summary-stat"><span>🌙 รอดำเนินการ</span><span class="stat-num">'+(filtered.length-done)+'</span></div><div class="summary-list">';
  if(!filtered.length)h+='<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px">🌟 ไม่มีแผน</div>';
  filtered.sort(function(a,b){return a.date>b.date?1:a.date<b.date?-1:(a.time>b.time?1:-1);}).forEach(function(e){
    const cat=CATS[e.cat]||CATS.work;
    h+='<div class="sum-event" onclick="viewEvent(\''+e.id+'\',event)"><div class="sum-dot" style="background:'+cat.bg+';border:1px solid '+cat.color+'40"></div><div><div class="sum-info '+(e.done?'sum-done':'')+'">'+esc(e.title)+'</div><div class="sum-time">'+e.date+' '+(e.time||'')+' '+(e.loc?'📍'+esc(e.loc):'')+'</div></div></div>';
  });
  const el=document.getElementById('summary-content');
  if(el)el.innerHTML=h+'</div>';
}

// ====================================================
// NOTIFICATIONS
// ====================================================
function checkNotifications(){
  const now=new Date();
  const upcoming=events.filter(function(e){if(!e.time||e.done)return false;const ev=new Date(e.date+'T'+e.time);const diff=(ev-now)/60000;return diff>0&&diff<=120;});
  const badge=document.getElementById('notif-badge');
  if(badge){badge.textContent=upcoming.length;badge.style.display=upcoming.length?'flex':'none';}
  let h=upcoming.length?'':'<div style="color:var(--text3);font-size:13px;text-align:center;padding:8px">🌙 ไม่มีการแจ้งเตือน</div>';
  upcoming.forEach(function(e){
    const evDt=new Date(e.date+'T'+e.time);const diff=Math.round((evDt-new Date())/60000);
    const urg=diff<=30?'urgent':diff<=60?'soon':'info';
    h+='<div class="notif-item '+urg+'" onclick="viewEvent(\''+e.id+'\',event)"><div class="notif-dot dot-'+urg+'"></div><div><div class="notif-text">⏰ <b>'+esc(e.title)+'</b></div><div class="notif-time">'+diff+' นาทีข้างหน้า</div></div></div>';
  });
  const el=document.getElementById('notif-list');if(el)el.innerHTML=h;
}
function toggleNotif(){document.getElementById('notif-panel').classList.toggle('open');checkNotifications();}

// ====================================================
// HABITS (localStorage — personal, not shared data)
// ====================================================
let habits=[];
try{habits=JSON.parse(localStorage.getItem('sp-habits')||'[]');}catch(e){habits=[];}
if(!habits.length){habits=[{id:'h1',name:'ออกกำลังกาย',logs:{}},{id:'h2',name:'อ่านหนังสือ',logs:{}},{id:'h3',name:'ดื่มน้ำ 8 แก้ว',logs:{}}];}
function saveHabits(){try{localStorage.setItem('sp-habits',JSON.stringify(habits));}catch(e){}}
function getWeek7(){const today=new Date(),dow=today.getDay(),off=dow===0?-6:1-dow;return Array.from({length:7},function(_,i){const d=new Date(today);d.setDate(today.getDate()+off+i);return fmt(d.getFullYear(),d.getMonth(),d.getDate());});}
function renderHabits(){
  const week=getWeek7();
  const today=fmt(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dayLabels=['จ','อ','พ','พฤ','ศ','ส','อา'];
  const d0=new Date(week[0]),d6=new Date(week[6]);
  const mlEl=document.getElementById('habit-month-label');
  if(mlEl)mlEl.textContent=d0.getDate()+' '+months[d0.getMonth()]+' – '+d6.getDate()+' '+months[d6.getMonth()];
  for(let i=0;i<7;i++){const el=document.getElementById('hw'+i);if(el){el.textContent=dayLabels[i];el.style.color=week[i]===today?'#D63031':'#4DC9C2';}}
  let h='';
  if(!habits.length)h='<div class="habit-empty">กด + เพิ่ม habit แรก</div>';
  habits.forEach(function(hb){
    const dots=week.map(function(ds){return '<div class="habit-dot'+(hb.logs[ds]?' done':'')+(ds===today?' today-col':'')+'" onclick="toggleHabit(\''+hb.id+'\',\''+ds+'\')"></div>';}).join('');
    h+='<div class="habit-row"><div class="habit-name-cell"><div class="habit-icon" style="color:#4DC9C2">📌</div><span class="habit-name" title="'+esc(hb.name)+'">'+esc(hb.name)+'</span><div class="habit-actions"><button class="habit-act-btn habit-edit-btn" onclick="openHabitModal(\''+hb.id+'\')">✎</button><button class="habit-act-btn habit-del-btn" onclick="deleteHabit(\''+hb.id+'\')">✕</button></div></div>'+dots+'</div>';
  });
  const el=document.getElementById('habit-list');if(el)el.innerHTML=h;
}
function toggleHabit(hid,ds){const h=habits.find(function(x){return x.id===hid;});if(!h)return;h.logs[ds]=!h.logs[ds];saveHabits();renderHabits();if(h.logs[ds])showToast(h.name+' ✓','','done');}
function deleteHabit(hid){if(!confirm('ลบ habit นี้?'))return;habits=habits.filter(function(x){return x.id!==hid;});saveHabits();renderHabits();}
let editHabitId=null;
function openHabitModal(hid){
  editHabitId=hid||null;
  const h=hid?habits.find(function(x){return x.id===hid;}):null;
  const existing=document.getElementById('habit-modal-overlay');
  if(existing)existing.remove();
  const overlay=document.createElement('div');
  overlay.className='habit-modal-overlay';overlay.id='habit-modal-overlay';
  overlay.innerHTML='<div class="habit-modal"><div class="habit-modal-title">'+(h?'✎ แก้ไข':'＋ เพิ่ม')+' Habit</div><input id="hm-name" placeholder="ชื่อ habit..." value="'+esc(h?h.name:'')+'"><div class="habit-modal-row"><button class="habit-modal-cancel" onclick="closeHabitModal()">ยกเลิก</button><button class="habit-modal-save" onclick="saveHabitModal()">บันทึก</button></div></div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeHabitModal();});
  document.getElementById('hm-name').focus();
}
function closeHabitModal(){const el=document.getElementById('habit-modal-overlay');if(el)el.remove();editHabitId=null;}
function saveHabitModal(){
  const name=(document.getElementById('hm-name').value||'').trim();
  if(!name)return;
  if(editHabitId){const h=habits.find(function(x){return x.id===editHabitId;});if(h)h.name=name;}
  else habits.push({id:'h'+Date.now(),name:name,logs:{}});
  saveHabits();closeHabitModal();renderHabits();
  showToast(name+(editHabitId?' แก้ไขแล้ว':' เพิ่มแล้ว'),'','add');
}

// ====================================================
// FLOATING STARS & MICKEY
// ====================================================
function initStars(){
  const emojis=['✦','✧','⋆','˚','·','✶'];
  const wrap=document.getElementById('float-stars');
  if(!wrap)return;
  for(let i=0;i<18;i++){
    const s=document.createElement('div');s.className='float-star';
    s.textContent=emojis[i%emojis.length];
    const sz=Math.random()*12+8;
    s.style.cssText='font-size:'+sz+'px;left:'+(Math.random()*100)+'vw;top:'+(Math.random()*100)+'vh;animation-duration:'+(4+Math.random()*6)+'s;animation-delay:'+(Math.random()*4)+'s;opacity:'+(.3+Math.random()*.4)+';color:'+['#4DC9C2','#FFB8D8','#B8D8FF','#FFE87A'][i%4]+';';
    wrap.appendChild(s);
  }
}
function initMickey(){
  const msgs=['อย่าลืมนัดนะ! 🌟','Mickey อยู่นี่~ 🐭','มีนัดไหมวันนี้? ✨','Have a great day! 🚀'];
  let idx=0;
  const el=document.getElementById('mickey-msg');
  if(!el)return;
  setInterval(function(){idx=(idx+1)%msgs.length;el.textContent=msgs[idx];},4000);
}

// ====================================================
// BOOT
// ====================================================
window.addEventListener('DOMContentLoaded',function(){
  const ov=document.getElementById('login-overlay');
  const stored=sessionStorage.getItem('sp-user');
  if(stored&&ALLOWED_EMAILS[stored]){
    if(ov)ov.style.display='none';
  }else{
    if(ov)ov.style.display='flex';
    setTimeout(function(){const el=document.getElementById('login-email');if(el)el.focus();},100);
  }
  setView('month');
  renderSummary();
  checkNotifications();
  renderHabits();
  initStars();
  initMickey();
  setInterval(checkNotifications,60000);
});
