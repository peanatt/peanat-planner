<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐭 PLANNER - PEANAT.NN</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#0D1B3E;--teal:#4DC9C2;--teal2:#2BA8A0;--red:#D63031;
  --text:#FFFFFF;--text2:#C8D8F0;--text3:#8AA8CC;
  --card-r:20px;--font:'Baloo 2',sans-serif;
}
body{font-family:var(--font);background:linear-gradient(160deg,#050E24 0%,#0D1B3E 40%,#0A2244 70%,#0D1030 100%);min-height:100vh;color:var(--text);position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background-image:radial-gradient(circle,#FFFFFF99 1px,transparent 1px),radial-gradient(circle,#4DC9C260 1px,transparent 1px),radial-gradient(circle,#FFE87A50 1px,transparent 1px);
  background-size:80px 80px,120px 120px,100px 100px;background-position:0 0,40px 40px,20px 60px;opacity:0.5;z-index:0;}

.wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:16px;}

/* ===== HEADER ===== */
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;
  background:rgba(13,27,62,0.95);backdrop-filter:blur(12px);border-radius:var(--card-r);
  border:2px solid rgba(77,201,194,0.4);margin-bottom:16px;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;}
/* Mickey logo in header - small inline SVG */
.logo-mickey-wrap{position:relative;width:44px;height:44px;flex-shrink:0;}
.logo-mickey-wrap svg{filter:drop-shadow(0 0 6px rgba(77,201,194,0.6));}
.logo-wrap{display:flex;flex-direction:column;line-height:1.1;}
.logo-text{font-size:19px;font-weight:800;color:#4DC9C2;letter-spacing:.5px;animation:pulse-logo 3s ease-in-out infinite;}
.logo-sub{font-size:11px;font-weight:600;color:#8AA8CC;letter-spacing:1px;margin-top:-2px;}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{font-family:var(--font);font-size:13px;font-weight:700;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.btn-gcal{background:linear-gradient(135deg,#1E3A6E,#2A4A8E);color:#4DC9C2;border:2px solid rgba(77,201,194,0.5);}
.btn-gcal:hover{opacity:.85;transform:translateY(-1px);}
.btn-add{background:linear-gradient(135deg,#D63031,#A01010);color:#FFF;border:2px solid rgba(255,80,80,0.5);}
.btn-add:hover{opacity:.85;transform:translateY(-1px);}
.btn-notify{background:linear-gradient(135deg,#1A4030,#1A3850);color:#80FFD0;border:2px solid rgba(128,255,208,0.3);position:relative;}
.notif-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#FF4444;border-radius:50%;font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;}
.gs-status{background:rgba(20,60,30,0.7);border:1.5px solid rgba(77,201,194,0.4);border-radius:10px;padding:6px 12px;font-size:12px;font-weight:700;color:#80FFD0;display:flex;align-items:center;gap:6px;}
.gs-dot{width:7px;height:7px;border-radius:50%;background:#4DC9C2;animation:twinkle 1.5s ease-in-out infinite;}

/* ===== NOTIF ===== */
.notif-panel{background:rgba(10,22,50,0.97);border:2px solid rgba(77,201,194,0.35);border-radius:var(--card-r);padding:16px;margin-bottom:12px;display:none;}
.notif-panel.open{display:block;}
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:8px;border-radius:10px;margin-bottom:6px;cursor:pointer;}
.notif-item.urgent{background:rgba(255,80,80,0.12);}
.notif-item.soon{background:rgba(255,200,80,0.1);}
.notif-item.info{background:rgba(77,201,194,0.1);}
.notif-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.dot-urgent{background:#FF8080;}.dot-soon{background:#FFB840;}.dot-info{background:#4DC9C2;}
.notif-text{font-size:14px;color:var(--text);line-height:1.4;}
.notif-time{font-size:12px;color:var(--text3);}

/* ===== LAYOUT: sidebar fixed width + calendar fills rest ===== */
.main-layout{display:grid;grid-template-columns:280px 1fr;gap:16px;align-items:start;}
@media(max-width:900px){.main-layout{grid-template-columns:1fr;}}

/* ===== SIDEBAR ===== */
.sidebar{display:flex;flex-direction:column;gap:12px;}

/* Summary card */
.summary-card{background:rgba(13,27,62,0.92);backdrop-filter:blur(8px);border-radius:var(--card-r);padding:16px;border:2px solid rgba(77,201,194,0.3);}
.summary-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.stab{font-family:var(--font);font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;border:1.5px solid transparent;cursor:pointer;background:none;color:#8AA8CC;transition:.15s;}
.stab.active{background:rgba(77,201,194,0.2);color:#4DC9C2;border-color:rgba(77,201,194,0.5);}
.summary-stat{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(77,201,194,0.2);font-size:13px;color:#C8D8F0;font-weight:600;}
.summary-stat:last-child{border:none;}
.stat-num{font-weight:800;font-size:16px;color:#4DC9C2;}
.summary-list{margin-top:8px;}
.sum-event{display:flex;gap:8px;align-items:flex-start;padding:6px 8px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:.15s;}
.sum-event:hover{background:rgba(77,201,194,0.12);}
.sum-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.sum-info{font-size:13px;color:#FFF;line-height:1.4;font-weight:600;}
.sum-time{font-size:11px;color:#8AA8CC;}
.sum-done{text-decoration:line-through;opacity:.5;}

/* ===== HABIT TRACKER ===== */
.habit-card{background:rgba(13,27,62,0.92);backdrop-filter:blur(8px);border-radius:var(--card-r);padding:16px;border:2px solid rgba(77,201,194,0.3);}
.habit-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.habit-title{font-size:15px;font-weight:800;color:#4DC9C2;}
.habit-add-btn{background:rgba(77,201,194,0.15);border:1.5px solid rgba(77,201,194,0.4);border-radius:8px;padding:5px 12px;color:#4DC9C2;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.habit-add-btn:hover{background:rgba(77,201,194,0.3);}
.habit-month-label{font-size:11px;font-weight:700;color:#8AA8CC;margin-bottom:6px;text-align:center;}
.habit-week-row{display:grid;grid-template-columns:100px repeat(7,minmax(0,1fr));gap:3px;margin-bottom:4px;}
.habit-week-label{font-size:10px;font-weight:800;color:#4DC9C2;text-align:center;padding:2px 0;min-width:0;overflow:hidden;}
.habit-row{display:grid;grid-template-columns:100px repeat(7,minmax(0,1fr));gap:3px;align-items:center;margin-bottom:6px;}
.habit-dot{width:100%;aspect-ratio:1;border-radius:6px;border:1.5px solid rgba(77,201,194,0.2);background:rgba(13,27,62,0.5);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0;position:relative;}
/* name cell */
.habit-name-cell{display:flex;align-items:center;gap:5px;padding-right:4px;position:relative;}
.habit-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;background:rgba(77,201,194,0.12);border:1px solid rgba(77,201,194,0.2);}
.habit-name{font-size:11px;font-weight:700;color:#C8D8F0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;cursor:pointer;}
.habit-name:hover{color:#4DC9C2;}
/* action buttons shown on hover */
.habit-name-cell:hover .habit-actions{opacity:1;}
.habit-actions{opacity:0;transition:.15s;display:flex;gap:2px;position:absolute;right:-2px;top:50%;transform:translateY(-50%);background:rgba(13,27,62,0.95);border-radius:6px;padding:2px 3px;border:1px solid rgba(77,201,194,0.2);}
.habit-act-btn{background:none;border:none;cursor:pointer;font-size:11px;padding:1px 3px;border-radius:4px;line-height:1;font-family:var(--font);}
.habit-edit-btn{color:#4DC9C2;}.habit-edit-btn:hover{background:rgba(77,201,194,0.2);}
.habit-del-btn{color:#FF8080;}.habit-del-btn:hover{background:rgba(255,80,80,0.15);}
.habit-dot:hover{border-color:rgba(77,201,194,0.5);background:rgba(77,201,194,0.08);}
.habit-dot.done{background:linear-gradient(135deg,#4DC9C2,#2BA8A0);border-color:#4DC9C2;box-shadow:0 0 6px rgba(77,201,194,0.4);}
.habit-dot.done::after{content:'';display:block;width:6px;height:10px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg);margin-top:-2px;}
.habit-dot.today-col{border-color:rgba(214,48,49,0.55);}
.habit-dot.done.today-col{background:linear-gradient(135deg,#D63031,#A01010);box-shadow:0 0 6px rgba(214,48,49,0.4);}
/* streak bar */
.habit-streak-row{grid-column:2/-1;display:flex;align-items:center;gap:4px;padding-bottom:2px;}
.habit-streak-bar{height:2px;border-radius:2px;background:linear-gradient(90deg,#FFE87A,#FFA040);flex:1;}
.habit-streak-txt{font-size:9px;color:#FFE87A;font-weight:800;white-space:nowrap;}
.habit-empty{text-align:center;font-size:12px;color:#8AA8CC;padding:20px 0;}
/* modal for add/edit habit */
.habit-modal-overlay{position:fixed;inset:0;background:rgba(5,14,36,0.8);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;}
.habit-modal{background:rgba(13,27,62,0.99);border:2px solid rgba(77,201,194,0.4);border-radius:20px;padding:24px;width:min(340px,90vw);box-shadow:0 20px 60px rgba(0,10,40,0.7);}
.habit-modal-title{font-size:16px;font-weight:800;color:#4DC9C2;margin-bottom:16px;}
.habit-modal input{width:100%;font-family:var(--font);font-size:14px;font-weight:600;padding:9px 12px;border:2px solid rgba(77,201,194,0.3);border-radius:10px;color:#fff;background:rgba(20,40,80,0.6);outline:none;margin-bottom:10px;}
.habit-modal input:focus{border-color:rgba(77,201,194,0.7);}
.habit-icon-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.icon-opt{width:36px;height:36px;border-radius:8px;border:2px solid rgba(77,201,194,0.2);background:rgba(13,27,62,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.15s;}
.icon-opt:hover,.icon-opt.sel{border-color:#4DC9C2;background:rgba(77,201,194,0.15);}
.habit-modal-row{display:flex;gap:8px;justify-content:flex-end;}
.habit-modal-cancel{font-family:var(--font);font-size:13px;font-weight:700;padding:8px 16px;border-radius:10px;border:2px solid rgba(77,201,194,0.2);background:rgba(20,40,80,0.5);color:#8AA8CC;cursor:pointer;}
.habit-modal-save{font-family:var(--font);font-size:13px;font-weight:800;padding:8px 20px;border-radius:10px;border:none;background:linear-gradient(135deg,#4DC9C2,#2BA8A0);color:#0D1B3E;cursor:pointer;}

/* ===== MAIN CALENDAR — fills remaining space ===== */
.cal-area{background:rgba(13,27,62,0.92);backdrop-filter:blur(8px);border-radius:var(--card-r);padding:20px;border:2px solid rgba(77,201,194,0.3);min-height:600px;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap;}
.cal-title{font-size:22px;font-weight:800;color:#4DC9C2;}
.view-tabs{display:flex;gap:4px;}
.vtab{font-family:var(--font);font-size:13px;font-weight:700;padding:7px 14px;border-radius:10px;border:2px solid rgba(77,201,194,0.3);cursor:pointer;background:none;color:#8AA8CC;transition:.15s;}
.vtab.active{background:linear-gradient(135deg,#1A4A5A,#0D3040);color:#4DC9C2;border-color:rgba(77,201,194,0.6);}
.cal-nav{display:flex;gap:6px;align-items:center;}
.nav-btn{font-family:var(--font);font-size:16px;font-weight:700;background:rgba(20,40,80,0.6);border:2px solid rgba(77,201,194,0.3);border-radius:10px;padding:6px 14px;cursor:pointer;color:#4DC9C2;transition:.15s;}
.nav-btn:hover{background:rgba(77,201,194,0.15);}
.nav-today{font-size:13px;font-weight:700;}

/* Month grid */
.month-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:0;border:2.5px solid rgba(77,201,194,0.6);border-radius:16px;overflow:hidden;}
.day-label{text-align:center;font-size:13px;font-weight:800;color:#4DC9C2;padding:10px 0;background:rgba(20,50,100,0.85);border-right:2px solid rgba(77,201,194,0.4);border-bottom:2.5px solid rgba(77,201,194,0.6);width:100%;min-width:0;overflow:hidden;}
.day-label:last-child{border-right:none;}
.day-cell{min-height:100px;padding:6px;cursor:pointer;transition:.15s;border-right:1.5px solid rgba(77,201,194,0.3);border-bottom:1.5px solid rgba(77,201,194,0.3);background:rgba(13,27,62,0.6);width:100%;min-width:0;overflow:hidden;}
.day-cell:nth-child(7n){border-right:none;}
.day-cell:hover{background:rgba(77,201,194,0.1);}
.day-cell.other{opacity:.3;background:rgba(5,14,36,0.4);}
.day-cell.today{background:linear-gradient(135deg,rgba(214,48,49,0.15),rgba(160,16,16,0.1));border-color:rgba(214,48,49,0.4)!important;}
.day-num{font-size:14px;font-weight:800;color:#FFF;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.day-cell.today .day-num{background:linear-gradient(135deg,#D63031,#A01010);color:#FFF;}
.day-cell.selected{background:rgba(77,201,194,0.12);}
.event-chip{font-size:11px;font-weight:700;padding:3px 7px;border-radius:6px;margin-top:2px;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;}
.event-chip:hover{opacity:.8;}
.chip-meeting{background:rgba(160,144,232,0.3);color:#DDD6FF;border:1px solid rgba(160,144,232,0.5);}
.chip-personal{background:rgba(255,160,200,0.25);color:#FFB8D8;border:1px solid rgba(255,160,200,0.5);}
.chip-work{background:rgba(77,201,194,0.2);color:#80FFD0;border:1px solid rgba(77,201,194,0.4);}
.chip-done{opacity:.4;text-decoration:line-through;}
.chip-health{background:rgba(255,200,80,0.2);color:#FFE87A;border:1px solid rgba(255,200,80,0.4);}
.chip-travel{background:rgba(110,198,255,0.2);color:#6EC6FF;border:1px solid rgba(110,198,255,0.4);}
.more-chip{font-size:10px;color:#4DC9C2;padding:1px 4px;cursor:pointer;font-weight:700;}

/* Week view */
.week-grid{display:grid;grid-template-columns:48px repeat(7,1fr);gap:0;}
.week-day-head{text-align:center;padding:4px;border-radius:8px;margin:2px;}
.week-day-name{font-size:11px;font-weight:700;color:#8AA8CC;}
.week-day-num{font-size:18px;font-weight:800;color:#C8D8F0;}
.week-day-num.today{background:linear-gradient(135deg,#D63031,#A01010);color:#FFF;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.hour-cell{height:48px;border-top:1.5px solid rgba(77,201,194,0.2);border-left:1.5px solid rgba(77,201,194,0.15);position:relative;background:rgba(13,27,62,0.5);}
.hour-label{height:48px;border-top:1.5px solid rgba(77,201,194,0.2);display:flex;align-items:flex-start;justify-content:flex-end;padding-right:6px;padding-top:2px;font-size:11px;color:var(--text3);}

/* Day view */
.day-header-big{text-align:center;padding:12px;margin-bottom:12px;}
.day-big-num{font-size:52px;font-weight:800;color:#4DC9C2;}
.day-big-name{font-size:15px;color:#8AA8CC;font-weight:600;}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,14,36,0.75);backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:rgba(13,27,62,0.99);border:2px solid rgba(77,201,194,0.4);border-radius:24px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,10,40,0.7);}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:19px;font-weight:800;color:#4DC9C2;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#8AA8CC;padding:4px 8px;border-radius:8px;}
.modal-close:hover{background:rgba(77,201,194,0.15);}
.form-group{margin-bottom:14px;}
.form-label{font-size:13px;font-weight:700;color:#C8D8F0;margin-bottom:5px;display:block;}
.form-input{width:100%;font-family:var(--font);font-size:14px;font-weight:600;padding:9px 12px;border:2px solid rgba(77,201,194,0.3);border-radius:10px;color:#FFF;background:rgba(20,40,80,0.6);outline:none;transition:.15s;}
.form-input:focus{border-color:rgba(77,201,194,0.7);background:rgba(25,50,100,0.8);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.btn-save{background:linear-gradient(135deg,#1A4A5A,#0D3040);color:#4DC9C2;border:2px solid rgba(77,201,194,0.6);border-radius:10px;font-family:var(--font);font-weight:800;font-size:14px;padding:10px 20px;cursor:pointer;}
.btn-cancel{background:rgba(20,40,80,0.5);color:#8AA8CC;border:2px solid rgba(77,201,194,0.2);border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;padding:10px 20px;cursor:pointer;}
.btn-done-mark{background:linear-gradient(135deg,#0A3020,#0A2840);color:#80FFD0;border:2px solid rgba(128,255,208,0.3);border-radius:10px;font-family:var(--font);font-weight:800;font-size:14px;padding:10px 16px;cursor:pointer;}
.btn-delete{background:rgba(255,80,80,0.15);color:#FF8080;border:2px solid rgba(255,80,80,0.35);border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;padding:10px 16px;cursor:pointer;}
.map-link{display:flex;align-items:center;gap:6px;font-size:12px;color:#4DC9C2;text-decoration:none;padding:4px 8px;background:rgba(77,201,194,0.1);border-radius:8px;margin-top:4px;width:fit-content;font-weight:700;}
.gcal-hint{background:rgba(20,50,100,0.5);border-radius:12px;padding:12px;font-size:13px;color:#C8D8F0;margin-bottom:10px;border:1.5px solid rgba(77,201,194,0.25);font-weight:600;}
.gcal-hint a{color:#4DC9C2;font-weight:700;}
.ved-label{font-size:12px;font-weight:700;color:#8AA8CC;margin-bottom:2px;}
.ved-val{font-size:14px;color:#FFF;font-weight:600;}
.view-event-detail{margin-bottom:10px;}

/* Planets */
.planet{position:fixed;pointer-events:none;z-index:0;border-radius:50%;}
.p1{width:140px;height:140px;background:radial-gradient(circle,#1A4A5A,#0D2030);border:2px solid rgba(77,201,194,0.2);opacity:.35;top:5%;right:5%;}
.p2{width:90px;height:90px;background:radial-gradient(circle,#1A2A40,#0A1828);border:2px solid rgba(77,201,194,0.15);opacity:.3;bottom:15%;left:3%;}
.p3{width:60px;height:60px;background:radial-gradient(circle,#D63031,#7A0A0A);border:2px solid rgba(255,80,80,0.25);opacity:.25;top:40%;right:2%;}

/* Toast */
.toast{position:fixed;bottom:180px;right:24px;background:rgba(13,27,62,0.98);border-radius:14px;padding:12px 18px;box-shadow:0 8px 32px rgba(0,10,40,0.6);font-size:14px;font-weight:700;color:#FFF;z-index:9999;transform:translateY(80px);opacity:0;transition:.3s;display:flex;align-items:center;gap:8px;max-width:300px;border:2px solid rgba(77,201,194,0.4);}
.toast.show{transform:translateY(0);opacity:1;}
.empty-day{text-align:center;padding:20px;color:var(--text3);font-size:13px;font-weight:600;}
.float-star{position:fixed;pointer-events:none;z-index:0;font-size:16px;animation:floatStar linear infinite;}

/* ===== MICKEY MASCOT — locked bottom right ===== */
#mickey-wrap{
  position:fixed;z-index:10;
  right:24px;bottom:24px;
  pointer-events:none;  /* no drag */
  cursor:default;
  user-select:none;
}
.mickey-svg{filter:drop-shadow(0 4px 20px rgba(77,201,194,0.7)) drop-shadow(0 0 10px rgba(255,255,255,0.2));}
.mickey-speech{
  position:absolute;top:-70px;right:0px;
  background:#FFFFFF;border-radius:16px 16px 4px 16px;

  pointer-events:none;animation:speech-pop 2.5s ease-in-out infinite;
}
.mickey-speech::after{content:'';position:absolute;bottom:-10px;right:14px;border:5px solid transparent;border-top-color:#0D1B3E;}
.mickey-speech::before{content:'';position:absolute;bottom:-8px;right:14px;border:5px solid transparent;border-top-color:#FFF;z-index:1;}

@keyframes sparkle-in{0%{transform:scale(.5) translateY(20px);opacity:0;}60%{transform:scale(1.08) translateY(-4px);opacity:1;}100%{transform:scale(1) translateY(0);opacity:1;}}

const CATS={

  personal:{label:'ส่วนตัว',cls:'chip-personal',bg:'#FFD8EA',color:'#703050'},

function fmt(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function saveEvents(){localStorage.setItem('sp-events',JSON.stringify(events));}

let events=JSON.parse(localStorage.getItem('sp-events')||'[]');
if(!events.length){
  const d=new Date(),y=d.getFullYear(),m=d.getMonth();
  events=[
    {id:'1',title:'ประชุมทีม Q3',date:fmt(y,m,d.getDate()),time:'09:00',timeEnd:'10:00',cat:'meeting',who:'คุณ Somchai',loc:'ห้องประชุม A201',mapUrl:'',note:'ทบทวน OKR',done:false},
    {id:'2',title:'ตรวจสุขภาพ',date:fmt(y,m,d.getDate()+2),time:'08:30',timeEnd:'11:00',cat:'health',who:'Dr. Wanna',loc:'โรงพยาบาลกรุงเทพ',mapUrl:'',note:'นำบัตรประชาชน',done:false},
    {id:'3',title:'วันเกิดน้องสาว 🎂',date:fmt(y,m,d.getDate()+5),time:'18:00',timeEnd:'21:00',cat:'personal',who:'ครอบครัว',loc:'ร้าน The Terrace',mapUrl:'',note:'จองโต๊ะ 6 คน',done:false},
  ];
  saveEvents();
}

// ===== HABIT TRACKER =====
// Icon map: keyword → minimal SVG icon (monochrome, teal)
const HABIT_ICONS = [
  {k:['วิ่ง','ออกกำลัง','exercise','run','gym','sport','กีฬา','yoga','ยิม'],   svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="13" cy="3.5" r="1.5"/><path d="M10 6l-3 4h5l-1 5"/><path d="M7 10l-2 5"/><path d="M15 8l-1.5 2"/></svg>'},
  {k:['อ่าน','หนังสือ','book','read','study','เรียน'],                          svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h5v13H4z"/><path d="M9 4h1l5 2v11l-5-2H9"/><path d="M9 17V4"/></svg>'},
  {k:['น้ำ','water','ดื่ม','drink'],                                             svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3 C10 3 5 9 5 13a5 5 0 0010 0C15 9 10 3 10 3z"/><path d="M8 14a2 2 0 003-2"/></svg>'},
  {k:['เพลง','ดนตรี','music','guitar','piano','sing','ร้องเพลง','ฝึก'],         svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="15" r="2"/><circle cx="14" cy="13" r="2"/><path d="M8 15V7l8-2v8"/><path d="M8 11l8-2"/></svg>'},
  {k:['นอน','sleep','พัก','rest'],                                               svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10a7 7 0 0011-6 7 7 0 100 12A7 7 0 013 10z"/></svg>'},
  {k:['สมาธิ','meditation','นั่งสมาธิ','breath','mindful'],                     svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="5" r="2"/><path d="M6 10c0-2 2-3 4-3s4 1 4 3"/><path d="M4 16c1-3 3-4 6-4s5 1 6 4"/></svg>'},
  {k:['กิน','อาหาร','food','eat','meal','diet','ผัก'],                          svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3v5a3 3 0 006 0V3"/><path d="M9 8v9"/><path d="M15 3v12"/><path d="M13 3c0 3 2 4 2 6"/></svg>'},
  {k:['code','โค้ด','program','dev','เขียน','write','บันทึก','journal','diary'], svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7l-4 3 4 3"/><path d="M13 7l4 3-4 3"/><path d="M11 5l-2 10"/></svg>'},
  {k:['ทำความสะอาด','clean','house','บ้าน'],                                    svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17h14"/><path d="M5 17V9l5-6 5 6v8"/><path d="M8 17v-5h4v5"/></svg>'},
  {k:['ออมเงิน','เงิน','money','save','finance','บัญชี'],                       svg:'<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M10 6v1m0 6v1"/><path d="M8 8.5C8 7.7 8.9 7 10 7s2 .7 2 1.5-1 1.3-2 1.5-2 .8-2 1.5S8.9 13 10 13s2-.7 2-1.5"/></svg>'},
];
const DEFAULT_ICON = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7"/><path d="M10 7v3l2 2"/></svg>';

function getHabitIcon(name){
  const low=name.toLowerCase();
  for(const {k,svg} of HABIT_ICONS){if(k.some(kw=>low.includes(kw)))return svg;}
  return DEFAULT_ICON;
}

let habits=JSON.parse(localStorage.getItem('sp-habits')||'[]');
if(!habits.length){
  habits=[
    {id:'h1',name:'ออกกำลังกาย',logs:{}},
    {id:'h2',name:'อ่านหนังสือ',logs:{}},
    {id:'h3',name:'ดื่มน้ำ 8 แก้ว',logs:{}},
  ];
  localStorage.setItem('sp-habits',JSON.stringify(habits));
}
function saveHabits(){localStorage.setItem('sp-habits',JSON.stringify(habits));}

function getWeek7(){
  const today=new Date(),dow=today.getDay(),mondayOffset=dow===0?-6:1-dow;
  return Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()+mondayOffset+i);return fmt(d.getFullYear(),d.getMonth(),d.getDate());});
}

function renderHabits(){
  const week=getWeek7();
  const today=fmt(new Date().getFullYear(),new Date().getMonth(),new Date().getDate());
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dayLabels=['จ','อ','พ','พฤ','ศ','ส','อา'];
  const d0=new Date(week[0]),d6=new Date(week[6]);
  document.getElementById('habit-month-label').textContent=`${d0.getDate()} ${months[d0.getMonth()]} – ${d6.getDate()} ${months[d6.getMonth()]}`;
  week.forEach((ds,i)=>{
    const el=document.getElementById('hw'+i);
    if(el){el.textContent=dayLabels[i];el.style.color=ds===today?'#D63031':'#4DC9C2';el.style.fontWeight=ds===today?'900':'700';}
  });
  let html='';
  if(!habits.length){html='<div class="habit-empty">กด + เพิ่ม habit แรก</div>';}
  habits.forEach(h=>{
    // streak count
    let streak=0,checkD=new Date();
    while(true){const ds=fmt(checkD.getFullYear(),checkD.getMonth(),checkD.getDate());if(h.logs[ds])streak++;else break;checkD.setDate(checkD.getDate()-1);}
    const icon=getHabitIcon(h.name);
    let dots=week.map((ds,i)=>{
      const done=h.logs[ds]||false,isToday=ds===today;
      return `<div class="habit-dot${done?' done':''}${isToday?' today-col':''}" onclick="toggleHabit('${h.id}','${ds}')" title="${ds}"></div>`;
    }).join('');
    html+=`<div class="habit-row">
      <div class="habit-name-cell">
        <div class="habit-icon" style="color:#4DC9C2;">${icon}</div>
        <span class="habit-name" title="${h.name}" onclick="openHabitModal('${h.id}')">${h.name}</span>
        <div class="habit-actions">
          <button class="habit-act-btn habit-edit-btn" onclick="openHabitModal('${h.id}')" title="แก้ไข">✎</button>
          <button class="habit-act-btn habit-del-btn" onclick="deleteHabit('${h.id}')" title="ลบ">✕</button>
        </div>
      </div>
      ${dots}
    </div>`;
    if(streak>=2){
      const pct=Math.min(streak/30*100,100);
      html+=`<div style="display:grid;grid-template-columns:100px 1fr;gap:3px;margin-bottom:4px;margin-top:-3px;">
        <div></div>
        <div style="display:flex;align-items:center;gap:5px;padding-right:2px;">
          <div class="habit-streak-bar" style="width:${pct}%"></div>
          <span class="habit-streak-txt">🔥 ${streak} วัน</span>
        </div>
      </div>`;
    }
  });
  document.getElementById('habit-list').innerHTML=html;
}

function toggleHabit(hid,ds){

  saveHabits();renderHabits();

}
function deleteHabit(hid){
  if(!confirm('ลบ habit นี้?'))return;
  habits=habits.filter(x=>x.id!==hid);saveHabits();renderHabits();
}

function selectIconOpt(el){document.querySelectorAll('#hm-icons .icon-opt').forEach(e=>e.classList.remove('sel'));el.classList.add('sel');}
function closeHabitModal(){const el=document.getElementById('habit-modal-overlay');if(el)el.remove();_editHabitId=null;}
function saveHabitModal(){

async function syncToSheet(ev,action='add'){
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL==='YOUR_APPS_SCRIPT_WEB_APP_URL_HERE')return;
  try{
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,event:ev})});
    document.getElementById('gs-status').innerHTML='<div class="gs-dot"></div>ซิงค์แล้ว ✓';
    setTimeout(()=>{document.getElementById('gs-status').innerHTML='<div class="gs-dot"></div>Google Sheet';},2000);
  }catch(e){document.getElementById('gs-status').innerHTML='<div class="gs-dot" style="background:#FF8080"></div>Offline';}
}

function playTing(type){
  try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);
    if(type==='add'){o.frequency.setValueAtTime(880,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(1320,ctx.currentTime+.08);}
    else if(type==='done'){o.frequency.setValueAtTime(660,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(990,ctx.currentTime+.12);}
    else if(type==='delete'){o.frequency.setValueAtTime(440,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(220,ctx.currentTime+.15);}
    else{o.frequency.setValueAtTime(1046,ctx.currentTime);}
    o.type='sine';g.gain.setValueAtTime(.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.45);
    o.start(ctx.currentTime);o.stop(ctx.currentTime+.45);}catch(e){}
}
function showToast(msg,icon,sound){
  playTing(sound||'default');
  const t=document.getElementById('toast');t.innerHTML=(icon?icon+' ':'')+msg;t.classList.remove('show');
  void t.offsetWidth;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

let curView='month',curDate=new Date(),selectedDate=new Date(),editId=null,sumTab='day';

function getTitle(){
  const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  if(curView==='month')return months[curDate.getMonth()]+' '+(curDate.getFullYear()+543);
  if(curView==='week'){const s=new Date(curDate);s.setDate(curDate.getDate()-curDate.getDay());const e=new Date(s);e.setDate(s.getDate()+6);return `${s.getDate()} – ${e.getDate()} ${months[e.getMonth()]} ${e.getFullYear()+543}`;}
  return `${days[curDate.getDay()]} ${curDate.getDate()} ${months[curDate.getMonth()]} ${curDate.getFullYear()+543}`;
}

function renderMonth(){
  const y=curDate.getFullYear(),m=curDate.getMonth();
  const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate(),today=new Date();
  const dLabels=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let html=dLabels.map(l=>`<div class="day-label">${l}</div>`).join('');
  const prevLast=new Date(y,m,0).getDate();
  for(let i=0;i<first;i++){const d=prevLast-first+1+i;html+=`<div class="day-cell other" onclick="openAddModal('${fmt(y,m-1,d)}')"><div class="day-num">${d}</div></div>`;}
  for(let d=1;d<=last;d++){
    const ds=fmt(y,m,d);
    const isToday=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    const isSel=ds===fmt(selectedDate.getFullYear(),selectedDate.getMonth(),selectedDate.getDate());
    const dayEvs=events.filter(e=>e.date===ds).sort((a,b)=>a.time>b.time?1:-1);
    let chips='';
    dayEvs.slice(0,3).forEach(e=>{chips+=`<div class="event-chip ${CATS[e.cat]?.cls||'chip-work'} ${e.done?'chip-done':''}" onclick="viewEvent('${e.id}',event)">${e.time?e.time.substring(0,5)+' ':''} ${e.title}</div>`;});
    if(dayEvs.length>3)chips+=`<div class="more-chip">+${dayEvs.length-3} อีก</div>`;
    html+=`<div class="day-cell${isToday?' today':''}${isSel?' selected':''}" onclick="openAddModal('${ds}')"><div class="day-num">${d}</div>${chips}</div>`;
  }
  const total=first+last,rem=total%7===0?0:7-(total%7);
  for(let d=1;d<=rem;d++){html+=`<div class="day-cell other" onclick="openAddModal('${fmt(y,m+1,d)}')"><div class="day-num">${d}</div></div>`;}
  document.getElementById('cal-body').innerHTML=`<div class="month-grid">${html}</div>`;
}

function renderWeek(){
  const start=new Date(curDate);start.setDate(curDate.getDate()-curDate.getDay());
  const days=[];for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);days.push(d);}
  const today=new Date();
  const dNames=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let header='<div style="grid-column:1"></div>';
  days.forEach((d,i)=>{const isT=d.toDateString()===today.toDateString();const dn=`<div class="week-day-num${isT?' today':''}">${d.getDate()}</div>`;header+=`<div class="week-day-head"><div class="week-day-name">${dNames[i]}</div>${dn}</div>`;});
  let body='';
  for(let h=7;h<21;h++){
    body+=`<div class="hour-label">${h}:00</div>`;
    days.forEach(d=>{const ds=fmt(d.getFullYear(),d.getMonth(),d.getDate());const hEvs=events.filter(e=>e.date===ds&&e.time&&parseInt(e.time)===h);let inner=hEvs.map(e=>`<div class="event-chip ${CATS[e.cat]?.cls||'chip-work'} ${e.done?'chip-done':''}" style="margin:0 0 2px;" onclick="viewEvent('${e.id}',event)">${e.time} ${e.title}</div>`).join('');body+=`<div class="hour-cell" onclick="openAddModal('${ds}')">${inner}</div>`;});
  }
  document.getElementById('cal-body').innerHTML=`<div class="week-grid" style="grid-template-columns:48px repeat(7,1fr);">${header}${body}</div>`;
}

function renderDay(){
  const ds=fmt(curDate.getFullYear(),curDate.getMonth(),curDate.getDate());
  const dNames=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const months=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const dayEvs=events.filter(e=>e.date===ds).sort((a,b)=>a.time>b.time?1:-1);
  let timeline='';
  for(let h=7;h<21;h++){
    const hEvs=dayEvs.filter(e=>e.time&&parseInt(e.time)===h);
    let blocks=hEvs.map(e=>`<div class="event-chip ${CATS[e.cat]?.cls||'chip-work'} ${e.done?'chip-done':''}" style="padding:7px 10px;margin:2px 0;font-size:13px;" onclick="viewEvent('${e.id}',event)">${e.time} — ${e.title}${e.loc?' 📍'+e.loc:''}</div>`).join('');
    timeline+=`<div style="font-size:11px;color:var(--text3);height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:4px;border-top:1.5px solid rgba(77,201,194,0.2);font-weight:600;">${h}:00</div>`;
    timeline+=`<div style="border-top:1.5px solid rgba(77,201,194,0.2);padding:2px 4px;min-height:52px;" onclick="openAddModal('${ds}')">${blocks}</div>`;
  }
  const noEvMsg=dayEvs.length===0?`<div class="empty-day">🌙 ยังไม่มีนัดหมายวันนี้</div>`:'';
  document.getElementById('cal-body').innerHTML=`<div class="day-header-big"><div class="day-big-name">${dNames[curDate.getDay()]}</div><div class="day-big-num">${curDate.getDate()} ${months[curDate.getMonth()]} ${curDate.getFullYear()+543}</div></div><div style="display:grid;grid-template-columns:48px 1fr;">${timeline}</div>${noEvMsg}`;
}

function setView(v,el){
  curView=v;
  if(el){document.querySelectorAll('.vtab').forEach(t=>t.classList.remove('active'));el.classList.add('active');}
  document.getElementById('cal-title').textContent=getTitle();
  if(v==='month')renderMonth();else if(v==='week')renderWeek();else renderDay();
}
function navPrev(){
  if(curView==='month')curDate=new Date(curDate.getFullYear(),curDate.getMonth()-1,1);
  else if(curView==='week')curDate=new Date(curDate.getTime()-7*86400000);
  else curDate=new Date(curDate.getTime()-86400000);
  setView(curView);
}
function navNext(){
  if(curView==='month')curDate=new Date(curDate.getFullYear(),curDate.getMonth()+1,1);
  else if(curView==='week')curDate=new Date(curDate.getTime()+7*86400000);
  else curDate=new Date(curDate.getTime()+86400000);
  setView(curView);
}
function goToday(){curDate=new Date();selectedDate=new Date();setView(curView);}

function setSumTab(tab,el){sumTab=tab;document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderSummary();}
function renderSummary(){
  const today=new Date(),ty=today.getFullYear(),tm=today.getMonth();
  let filtered=[];
  if(sumTab==='day')filtered=events.filter(e=>e.date===fmt(ty,tm,today.getDate()));
  else if(sumTab==='week'){const ws=new Date(today);ws.setDate(today.getDate()-today.getDay());const we=new Date(ws);we.setDate(ws.getDate()+6);filtered=events.filter(e=>{const d=new Date(e.date);return d>=ws&&d<=we;});}
  else if(sumTab==='month')filtered=events.filter(e=>e.date.startsWith(fmt(ty,tm,1).substring(0,7)));
  else filtered=events.filter(e=>e.date.startsWith(ty+''));
  const done=filtered.filter(e=>e.done).length,pending=filtered.length-done;
  let html=`<div class="summary-stat"><span>ทั้งหมด</span><span class="stat-num">${filtered.length}</span></div><div class="summary-stat"><span>เสร็จแล้ว ✅</span><span class="stat-num">${done}</span></div><div class="summary-stat"><span>รอดำเนินการ 🌙</span><span class="stat-num">${pending}</span></div><div class="summary-list">`;
  if(!filtered.length)html+=`<div style="text-align:center;color:var(--text3);font-size:12px;padding:12px;">🌟 ไม่มีแผน</div>`;
  filtered.sort((a,b)=>a.date>b.date?1:a.date<b.date?-1:a.time>b.time?1:-1).forEach(e=>{
    const cat=CATS[e.cat]||CATS.work;
    html+=`<div class="sum-event" onclick="viewEvent('${e.id}',event)"><div class="sum-dot" style="background:${cat.bg};border:1px solid ${cat.color}40;"></div><div><div class="sum-info ${e.done?'sum-done':''}">${e.title}</div><div class="sum-time">${e.date} ${e.time||''} ${e.loc?'📍'+e.loc:''}</div></div></div>`;
  });
  document.getElementById('summary-content').innerHTML=html+'</div>';
}

function checkNotifications(){
  const now=new Date();
  const upcoming=events.filter(e=>{if(e.done||!e.time)return false;const ev=new Date(e.date+'T'+e.time);const diff=(ev-now)/60000;return diff>0&&diff<=120;});
  const badge=document.getElementById('notif-badge');
  badge.textContent=upcoming.length;badge.style.display=upcoming.length?'flex':'none';
  let html=upcoming.length?'':'<div style="color:var(--text3);font-size:13px;text-align:center;padding:8px;">🌙 ไม่มีการแจ้งเตือนใหม่</div>';
  upcoming.forEach(e=>{const evDt=new Date(e.date+'T'+e.time);const diff=Math.round((evDt-new Date())/60000);const urg=diff<=30?'urgent':diff<=60?'soon':'info';const dot=urg==='urgent'?'dot-urgent':urg==='soon'?'dot-soon':'dot-info';html+=`<div class="notif-item ${urg}" onclick="viewEvent('${e.id}',event)"><div class="notif-dot ${dot}"></div><div><div class="notif-text">⏰ <b>${e.title}</b></div><div class="notif-time">${diff} นาทีข้างหน้า — ${e.loc||''}</div></div></div>`;});
  document.getElementById('notif-list').innerHTML=html;
}
function toggleNotif(){document.getElementById('notif-panel').classList.toggle('open');checkNotifications();}

function editEvent(id){const ev=events.find(x=>x.id===id);if(!ev)return;editId=id;document.getElementById('modal-title').textContent='✏️ แก้ไขนัดหมาย';document.getElementById('modal-body').innerHTML=buildForm(ev);}
function buildHours(t){const cur=t?parseInt(t.split(':')[0]):-1;let o='<option value="">-- ชม --</option>';for(let h=0;h<24;h++)o+=`<option value="${String(h).padStart(2,'0')}" ${cur===h?'selected':''}>${String(h).padStart(2,'0')}</option>`;return o;}
function buildMins(t){const cur=t?parseInt(t.split(':')[1]):-1;let o='<option value="">-- นาที --</option>';for(let m=0;m<60;m+=5)o+=`<option value="${String(m).padStart(2,'0')}" ${cur===m?'selected':''}>${String(m).padStart(2,'0')}</option>`;return o;}
function buildForm(ev){
  const isOther=ev.cat&&!CATS[ev.cat];const catSel=isOther?'other':ev.cat||'meeting';
  const catDrop=Object.entries(CATS).map(([k,v])=>`<option value="${k}" ${catSel===k?'selected':''}>${v.label}</option>`).join('')+`<option value="other" ${catSel==='other'?'selected':''}>อื่นๆ</option>`;
  const otherVal=isOther?ev.cat:'';
  return `<div class="form-group"><label class="form-label">✏️ ชื่อนัดหมาย *</label><input class="form-input" id="f-title" placeholder="เช่น ประชุมทีม..." value="${ev.title||''}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">📅 วันที่</label><input class="form-input" id="f-date" type="date" value="${ev.date||''}"></div>
      <div class="form-group"><label class="form-label">🏷️ หมวดหมู่</label><select class="form-input" id="f-cat" onchange="toggleOtherCat(this.value)" style="cursor:pointer;">${catDrop}</select></div>
    </div>
    <div class="form-group" id="other-cat-group" style="display:${catSel==='other'?'block':'none'};"><label class="form-label">📝 ระบุหมวดหมู่</label><input class="form-input" id="f-cat-other" placeholder="เช่น สัมมนา..." value="${otherVal}"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">🕐 เวลาเริ่ม</label><div style="display:flex;gap:6px;align-items:center;"><select class="form-input" id="f-time-h" style="flex:1;cursor:pointer;">${buildHours(ev.time)}</select><span style="font-weight:800;color:var(--text2);">:</span><select class="form-input" id="f-time-m" style="flex:1;cursor:pointer;">${buildMins(ev.time)}</select></div></div>
      <div class="form-group"><label class="form-label">🕐 เวลาสิ้นสุด</label><div style="display:flex;gap:6px;align-items:center;"><select class="form-input" id="f-timeEnd-h" style="flex:1;cursor:pointer;">${buildHours(ev.timeEnd)}</select><span style="font-weight:800;color:var(--text2);">:</span><select class="form-input" id="f-timeEnd-m" style="flex:1;cursor:pointer;">${buildMins(ev.timeEnd)}</select></div></div>
    </div>
    <div class="form-group"><label class="form-label">👥 นัดกับใคร</label><input class="form-input" id="f-who" placeholder="ชื่อบุคคล, ทีม..." value="${ev.who||''}"></div>
    <div class="form-group"><label class="form-label">📍 สถานที่</label><input class="form-input" id="f-loc" placeholder="เช่น ห้อง A201..." value="${ev.loc||''}"></div>
    <div class="form-group"><label class="form-label">🗺️ Google Maps</label><input class="form-input" id="f-map" placeholder="https://maps.google.com/?q=..." value="${ev.mapUrl||''}"></div>
    <div class="form-group"><label class="form-label">📝 บันทึก</label><textarea class="form-input" id="f-note" rows="2" placeholder="รายละเอียด...">${ev.note||''}</textarea></div>
    <div class="form-group"><label class="form-label">🔗 ลิ้งค์งาน / เว็บไซต์</label><input class="form-input" id="f-link" placeholder="https://..." value="${ev.link||''}"></div>
    <div class="form-group"><label class="form-label">📎 แนบไฟล์หรือรูปภาพ (URL หรือ Base64)</label><div style="display:flex;gap:8px;align-items:center;"><input class="form-input" id="f-attach" placeholder="วาง URL รูป/ไฟล์ หรือกดเลือกไฟล์" value="${ev.attach||''}" style="flex:1"><label style="cursor:pointer;background:rgba(77,201,194,0.15);border:2px solid rgba(77,201,194,0.4);border-radius:10px;padding:9px 12px;color:#4DC9C2;font-weight:700;font-size:13px;white-space:nowrap;font-family:var(--font);">📁 เลือก<input type="file" accept="image/*,.pdf,.doc,.docx,.xlsx,.pptx" onchange="handleFileAttach(this)" style="display:none"></label></div></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">ยกเลิก</button><button class="btn-save" onclick="saveEvent()">💾 บันทึก</button></div>`;
}
function toggleOtherCat(val){document.getElementById('other-cat-group').style.display=val==='other'?'block':'none';}
function handleFileAttach(input){
  const file=input.files[0];if(!file)return;
  if(file.size>2*1024*1024){showToast('ไฟล์ใหญ่เกิน 2MB — ใช้ URL แทนนะ','⚠️');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const attachInput=document.getElementById('f-attach');
    if(attachInput)attachInput.value=e.target.result;
    showToast('แนบไฟล์แล้ว 📎','','add');
  };
  reader.readAsDataURL(file);
}
async function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){showToast('กรุณาใส่ชื่อนัดหมาย','⚠️');return;}
  const catVal=document.getElementById('f-cat').value;
  const catFinal=catVal==='other'?(document.getElementById('f-cat-other').value.trim()||'other'):catVal;
  const tsh=document.getElementById('f-time-h').value,tsm=document.getElementById('f-time-m').value;
  const timeStart=(tsh&&tsm)?tsh+':'+tsm:'';
  const teh=document.getElementById('f-timeEnd-h').value,tem=document.getElementById('f-timeEnd-m').value;
  const timeEnd=(teh&&tem)?teh+':'+tem:'';
  const linkVal=document.getElementById('f-link')?document.getElementById('f-link').value.trim():'';
  const attachVal=document.getElementById('f-attach')?document.getElementById('f-attach').value.trim():'';
  const newId=editId||('ev-'+Date.now()+'-'+Math.random().toString(36).substr(2,5));
  const ev={id:newId,title,date:document.getElementById('f-date').value,time:timeStart,timeEnd,cat:catFinal,who:document.getElementById('f-who').value,loc:document.getElementById('f-loc').value,mapUrl:document.getElementById('f-map').value,note:document.getElementById('f-note').value,link:linkVal,attach:attachVal,done:false};
  if(editId){const i=events.findIndex(x=>x.id===editId);if(i>=0)events[i]={...events[i],...ev};syncToSheet(ev,'update');}
  else{
    // Duplicate guard: same title + date + time (only when time is filled)
    const dup=ev.time&&events.find(x=>x.title===ev.title&&x.date===ev.date&&x.time===ev.time);
    if(dup){showToast('มีนัดนี้อยู่แล้วนะ ⚠️','','default');closeModal();return;}
    events.push(ev);syncToSheet(ev,'add');
  }
  saveEvents();closeModal();setView(curView);renderSummary();checkNotifications();
  showToast(editId?'แก้ไขแล้ว ✨':'เพิ่มแล้ว 🐭','',editId?'default':'add');
  if(!editId){
    const d=ev.date.replace(/-/g,'');
    const tS=timeStart?timeStart.replace(':','')+'00':'000000';
    const tE=timeEnd?timeEnd.replace(':','')+'00':tS;
    let det=[];
    if(ev.who)det.push('👥 '+ev.who);
    if(ev.note)det.push('📝 '+ev.note);
    if(ev.link)det.push('🔗 '+ev.link);
    const gcalUrl='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(title)+'&dates='+d+'T'+tS+'/'+d+'T'+tE+'&location='+encodeURIComponent(ev.loc||'')+'&details='+encodeURIComponent(det.join('\n'));
    window.open(gcalUrl,'_blank');
  }
}
async function markDone(id){const i=events.findIndex(x=>x.id===id);events[i].done=true;syncToSheet(events[i],'update');saveEvents();closeModal();setView(curView);renderSummary();checkNotifications();showToast('เสร็จแล้ว! 🎉','','done');}
async function deleteEvent(id){if(!confirm('ลบนัดหมายนี้?'))return;syncToSheet({id},'delete');events=events.filter(x=>x.id!==id);saveEvents();closeModal();setView(curView);renderSummary();checkNotifications();showToast('ลบแล้ว 🗑️','','delete');}
function closeModal(){document.getElementById('modal').style.display='none';editId=null;}
function closeModalOutside(e){if(e.target===document.getElementById('modal'))closeModal();}
function connectGCal(){window.open('https://calendar.google.com','_blank');showToast('เปิด Google Calendar แล้ว! 🗓️','','add');}

const ALLOWED_EMAILS={'nnattkh.work@gmail.com':'Ko642323'};
// Add your email:password pairs above
function doLogin(){
  const em=document.getElementById('login-email').value.trim().toLowerCase();
  const pw=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  if(!em){err.textContent='กรุณากรอก Email';return;}
  if(!pw){err.textContent='กรุณากรอกรหัสผ่าน';return;}
  // Check stored session
  const stored=sessionStorage.getItem('sp-user');
  if(stored===em){document.getElementById('login-overlay').style.display='none';return;}
  // Validate
  if(ALLOWED_EMAILS[em]&&ALLOWED_EMAILS[em]===pw){
    sessionStorage.setItem('sp-user',em);
    document.getElementById('login-overlay').style.display='none';
    showToast('ยินดีต้อนรับ 🐭','','add');
  }else{
    err.textContent='Email หรือรหัสผ่านไม่ถูกต้อง';
    document.getElementById('login-pass').value='';
    document.getElementById('login-pass').focus();
  }
}
// Check existing session
(function(){
  const stored=sessionStorage.getItem('sp-user');
  if(stored&&Object.keys(ALLOWED_EMAILS).includes(stored)){
    document.getElementById('login-overlay').style.display='none';
  }else{
    // auto-focus email field after tiny delay
    setTimeout(()=>{const el=document.getElementById('login-email');if(el)el.focus();},100);
  }
})();
